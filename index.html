<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focus — Pomodoro Timer</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Nunito+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream:  #f5efe6;
  --sage:   #8aab7e;
  --glass:  rgba(255, 248, 240, 0.07);
  --border: rgba(255, 248, 240, 0.13);
  --shadow: 0 12px 56px rgba(0,0,0,0.45);

  /* ── Accent (user-themeable) ── */
  --accent:          #d4a876;
  --accent-glow:     rgba(212,168,118,.55);
  --accent-shadow:   rgba(212,168,118,.38);
  --accent-shadow-h: rgba(212,168,118,.52);
  --accent-subtle:   rgba(212,168,118,.45);
  --accent-tint:     rgba(212,168,118,.07);
  --accent-card-bg:  rgba(212,168,118,.15);
  --accent-card-br:  rgba(212,168,118,.40);

  /* ── Glass blur (user-adjustable) ── */
  --glass-blur: 28px;
}

/* ── Color themes ─────────────────────────────── */
body.theme-cool     { --accent:#7eb8d4; --accent-glow:rgba(126,184,212,.55); --accent-shadow:rgba(126,184,212,.38); --accent-shadow-h:rgba(126,184,212,.52); --accent-subtle:rgba(126,184,212,.45); --accent-tint:rgba(126,184,212,.07); --accent-card-bg:rgba(126,184,212,.15); --accent-card-br:rgba(126,184,212,.40); }
body.theme-sage     { --accent:#8aab7e; --accent-glow:rgba(138,171,126,.55); --accent-shadow:rgba(138,171,126,.38); --accent-shadow-h:rgba(138,171,126,.52); --accent-subtle:rgba(138,171,126,.45); --accent-tint:rgba(138,171,126,.07); --accent-card-bg:rgba(138,171,126,.15); --accent-card-br:rgba(138,171,126,.40); }
body.theme-rose     { --accent:#c97b78; --accent-glow:rgba(201,123,120,.55); --accent-shadow:rgba(201,123,120,.38); --accent-shadow-h:rgba(201,123,120,.52); --accent-subtle:rgba(201,123,120,.45); --accent-tint:rgba(201,123,120,.07); --accent-card-bg:rgba(201,123,120,.15); --accent-card-br:rgba(201,123,120,.40); }
body.theme-lavender { --accent:#9b8ec4; --accent-glow:rgba(155,142,196,.55); --accent-shadow:rgba(155,142,196,.38); --accent-shadow-h:rgba(155,142,196,.52); --accent-subtle:rgba(155,142,196,.45); --accent-tint:rgba(155,142,196,.07); --accent-card-bg:rgba(155,142,196,.15); --accent-card-br:rgba(155,142,196,.40); }
body.theme-gold     { --accent:#c9aa3a; --accent-glow:rgba(201,170,58,.55);  --accent-shadow:rgba(201,170,58,.38);  --accent-shadow-h:rgba(201,170,58,.52);  --accent-subtle:rgba(201,170,58,.45);  --accent-tint:rgba(201,170,58,.07);  --accent-card-bg:rgba(201,170,58,.15);  --accent-card-br:rgba(201,170,58,.40); }

html, body { height: 100%; font-family: 'Nunito Sans', sans-serif; color: var(--cream); overflow: hidden; }

/* ── Background ───────────────────────────────── */
#bg-prev {
  position: fixed; inset: 0; z-index: -3;
  background-size: cover; background-position: center 40%;
  filter: brightness(0.62) saturate(0.85); transform: scale(1.04);
}
#bg {
  position: fixed; inset: 0; z-index: -2;
  background-image: url('https://images.unsplash.com/photo-1448375240586-882707db888b?w=1920&q=80');
  background-size: cover; background-position: center 40%;
  filter: brightness(0.62) saturate(0.85); transform: scale(1.04);
  transition: filter 1.8s ease, opacity 0.7s ease;
}
#overlay {
  position: fixed; inset: 0; z-index: -1;
  background: linear-gradient(160deg, rgba(6,5,3,0.52) 0%, rgba(18,12,6,0.28) 60%, rgba(4,10,8,0.48) 100%);
  transition: background 1.8s ease, opacity .6s ease;
  opacity: var(--overlay-opacity, 1);
}

body.mode-work  { --primary-accent: var(--accent); --primary-text: #f5efe6; }
body.mode-break { --primary-accent: #8aab7e;        --primary-text: #e8f3e8; }
body.mode-break #bg     { filter: brightness(0.55) saturate(1.1) hue-rotate(45deg); }
body.mode-break #overlay{ background: linear-gradient(160deg,rgba(20,30,15,.48) 0%,rgba(30,45,20,.32) 60%,rgba(15,25,18,.52) 100%); }

/* ── Layout ───────────────────────────────────── */
.app {
  height: 100vh; display: grid;
  grid-template-columns: 1fr 310px; grid-template-rows: auto 1fr;
  gap: 18px; padding: 28px 32px; max-width: 1140px; margin: 0 auto;
}

/* ── Header ───────────────────────────────────── */
.header { grid-column: 1 / -1; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.logo {
  font-family: 'Cormorant Garamond', serif; font-style: italic;
  font-weight: 300; font-size: 1.45rem; letter-spacing: .14em;
  color: var(--primary-accent); opacity: .88; transition: color 1.2s ease;
  margin-right: auto;
}
.header-right { display: flex; align-items: center; gap: 10px; }

.hdr-btn {
  background: rgba(0,0,0,.25); border: 1px solid var(--border);
  color: var(--cream); font-family: 'Nunito Sans', sans-serif;
  font-size: .7rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase;
  padding: 7px 16px; border-radius: 50px; cursor: pointer;
  backdrop-filter: blur(16px); display: flex; align-items: center; gap: 6px;
  transition: background .2s ease;
}
.hdr-btn:hover { background: rgba(0,0,0,.4); }
.sounds-badge {
  background: var(--accent); color: #16100a;
  border-radius: 10px; padding: 1px 7px; font-size: .65rem; display: none;
}
.sounds-badge.visible { display: inline-block; }

.mode-toggle {
  display: flex; gap: 3px; background: rgba(0,0,0,.25);
  border: 1px solid var(--border); border-radius: 50px;
  padding: 4px; backdrop-filter: blur(16px);
}
.mode-btn {
  background: transparent; border: none; color: var(--cream);
  font-family: 'Nunito Sans', sans-serif; font-size: .7rem; font-weight: 600;
  letter-spacing: .1em; text-transform: uppercase; padding: 6px 16px;
  border-radius: 50px; cursor: pointer; opacity: .45; transition: all .3s ease; white-space: nowrap;
}
.mode-btn.active       { background: var(--accent); color: #1a1008; opacity: 1; }
.mode-btn.break-active { background: #8aab7e; color: #0d1a0d; opacity: 1; }

/* ── Timer Card ───────────────────────────────── */
.timer-card {
  background: var(--glass); border: 1px solid var(--border); border-radius: 28px;
  backdrop-filter: blur(var(--glass-blur)); -webkit-backdrop-filter: blur(var(--glass-blur));
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 30px; padding: 48px 40px; box-shadow: var(--shadow); position: relative; overflow: hidden;
}
.timer-card::before {
  content: ''; position: absolute; inset: -1px; border-radius: 28px;
  background: radial-gradient(ellipse 60% 40% at 50% 0%, var(--accent-tint), transparent 70%);
  pointer-events: none; transition: background 1.8s ease;
}
body.mode-break .timer-card::before { background: radial-gradient(ellipse 60% 40% at 50% 0%,rgba(138,171,126,.12),transparent 70%); }

.ring-wrap { position: relative; display: flex; align-items: center; justify-content: center; }
.timer-ring { transform: rotate(-90deg); }
.ring-bg    { fill: none; stroke: rgba(255,248,240,.07); stroke-width: 2.5; }
.ring-track { fill: none; stroke: rgba(255,248,240,.04); stroke-width: 2.5; stroke-dasharray: 6 6; }
.ring-progress {
  fill: none; stroke: var(--primary-accent); stroke-width: 2.5; stroke-linecap: round;
  stroke-dasharray: 678.6; stroke-dashoffset: 0;
  transition: stroke-dashoffset 1s linear, stroke .6s ease;
  filter: drop-shadow(0 0 10px var(--accent-glow));
}
.ring-progress.is-break { stroke: #8aab7e; filter: drop-shadow(0 0 10px rgba(138,171,126,.55)); }
.timer-center { position: absolute; text-align: center; user-select: none; }
.time-display {
  font-family: 'Cormorant Garamond', serif; font-size: 5rem;
  font-weight: 300; letter-spacing: -.03em; line-height: 1;
  color: var(--primary-text); transition: color 1.2s ease;
}
.mode-label {
  margin-top: 8px; font-size: .62rem; font-weight: 600;
  letter-spacing: .22em; text-transform: uppercase;
  color: var(--primary-accent); opacity: .65; transition: color 1.2s ease;
}
.mode-label.is-break { color: #8aab7e; }

.controls { display: flex; align-items: center; gap: 18px; }
.btn-icon {
  background: transparent; border: 1px solid var(--border); color: var(--cream);
  width: 42px; height: 42px; border-radius: 50%; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  opacity: .55; transition: all .2s ease; font-size: 1rem;
}
.btn-icon:hover { opacity: 1; border-color: rgba(255,248,240,.4); }
.btn-play {
  background: var(--primary-accent); border: none; color: #16100a;
  width: 64px; height: 64px; border-radius: 50%; cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 1.35rem;
  box-shadow: 0 4px 24px var(--accent-shadow); transition: all .22s ease, background 1.2s ease;
}
.btn-play:hover { transform: scale(1.08); box-shadow: 0 8px 32px var(--accent-shadow-h); }
.btn-play.is-break { background: #8aab7e; box-shadow: 0 4px 24px rgba(138,171,126,.38); }
.btn-play.is-break:hover { box-shadow: 0 8px 32px rgba(138,171,126,.52); }

.pips { display: flex; align-items: center; gap: 10px; }
.pip { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,248,240,.12); transition: background .4s ease, transform .3s ease; }
.pip.done { background: var(--primary-accent); }
.pip.done.bounce { animation: pipBounce .35s ease; }
@keyframes pipBounce { 0%{transform:scale(1)} 50%{transform:scale(1.5)} 100%{transform:scale(1)} }

/* ── Sidebar ──────────────────────────────────── */
.sidebar { display: flex; flex-direction: column; gap: 14px; min-height: 0; }
.panel {
  background: var(--glass); border: 1px solid var(--border); border-radius: 22px;
  backdrop-filter: blur(var(--glass-blur)); -webkit-backdrop-filter: blur(var(--glass-blur));
  padding: 24px 22px; box-shadow: var(--shadow);
}
.panel-label { font-size: .62rem; font-weight: 600; letter-spacing: .22em; text-transform: uppercase; color: var(--cream); opacity: .35; margin-bottom: 18px; }
.tasks-panel { flex: 1; display: flex; flex-direction: column; min-height: 0; }
.task-input-row { display: flex; gap: 8px; margin-bottom: 14px; }
.task-field {
  flex: 1; background: rgba(255,248,240,.06); border: 1px solid var(--border);
  border-radius: 10px; color: var(--cream); font-family: 'Nunito Sans', sans-serif;
  font-size: .8rem; padding: 8px 14px; outline: none; transition: border-color .2s ease; min-width: 0;
}
.task-field::placeholder { color: rgba(245,239,230,.25); }
.task-field:focus { border-color: var(--accent-subtle); }
.task-add {
  background: var(--accent); border: none; color: #16100a;
  height: 34px; padding: 0 14px; flex-shrink: 0; border-radius: 10px;
  cursor: pointer; font-size: .75rem; font-weight: 700; font-family: 'Nunito Sans', sans-serif;
  letter-spacing: .05em; display: flex; align-items: center; justify-content: center;
  transition: opacity .2s, transform .15s;
}
.task-add:hover { opacity: .82; transform: scale(1.06); }
.task-list { list-style: none; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 5px; padding-right: 2px; }
.task-list::-webkit-scrollbar { width: 3px; }
.task-list::-webkit-scrollbar-track { background: transparent; }
.task-list::-webkit-scrollbar-thumb { background: rgba(255,248,240,.12); border-radius: 2px; }
.task-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; background: rgba(255,248,240,.04); border-radius: 10px; animation: fadeUp .22s ease; transition: background .15s; }
.task-item:hover { background: rgba(255,248,240,.07); }
@keyframes fadeUp { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
.task-check { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid rgba(255,248,240,.22); background: transparent; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: .62rem; transition: all .2s ease; color: #fff; }
.task-check.done { background: var(--sage); border-color: var(--sage); }
.task-text { flex: 1; font-size: .8rem; font-weight: 300; line-height: 1.4; transition: all .22s ease; word-break: break-word; }
.task-text.done { text-decoration: line-through; opacity: .3; }
.task-del { background: transparent; border: none; color: var(--cream); opacity: 0; cursor: pointer; font-size: .72rem; padding: 2px 4px; border-radius: 4px; transition: opacity .15s; flex-shrink: 0; }
.task-item:hover .task-del { opacity: .35; }
.task-del:hover { opacity: 1 !important; }

/* ── Global range (dark theme) ─────────────────── */
input[type=range] { -webkit-appearance: none; appearance: none; height: 3px; background: rgba(255,248,240,.14); border-radius: 2px; outline: none; cursor: pointer; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--accent); cursor: pointer; box-shadow: 0 0 8px var(--accent-shadow); }
input[type=range]::-moz-range-thumb { width:14px;height:14px;border:none;border-radius:50%;background:var(--accent); }

/* ════════════════════════════════════════════════
   VIBE PANEL
   ════════════════════════════════════════════════ */
.vibe-backdrop {
  position: fixed; inset: 0; z-index: 890;
  background: rgba(0,0,0,.22); opacity: 0; pointer-events: none;
  transition: opacity .3s ease;
}
.vibe-backdrop.visible { opacity: 1; pointer-events: auto; }

.vibe-panel {
  position: fixed; top: 0; right: 0; bottom: 0; z-index: 895;
  width: 340px; background: rgba(11,8,5,.93);
  backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
  border-left: 1px solid rgba(255,248,240,.08);
  box-shadow: -24px 0 72px rgba(0,0,0,.5);
  display: flex; flex-direction: column;
  transform: translateX(100%);
  transition: transform .36s cubic-bezier(.4,0,.2,1);
}
.vibe-panel.open { transform: translateX(0); }

.vp-header {
  display: flex; align-items: center; padding: 22px 22px 16px;
  border-bottom: 1px solid rgba(255,248,240,.07); flex-shrink: 0;
}
.vp-title {
  font-family: 'Cormorant Garamond', serif; font-style: italic;
  font-size: 1.2rem; font-weight: 300; color: var(--cream);
  letter-spacing: .12em; flex: 1; opacity: .9;
}
.vp-close {
  background: none; border: none; color: rgba(255,248,240,.35);
  cursor: pointer; font-size: .95rem; padding: 6px 8px; border-radius: 8px;
  transition: color .15s, background .15s; line-height: 1;
}
.vp-close:hover { color: var(--cream); background: rgba(255,248,240,.06); }

.vp-body {
  flex: 1; overflow-y: auto; padding: 20px 22px;
  display: flex; flex-direction: column; gap: 24px;
}
.vp-body::-webkit-scrollbar { width: 3px; }
.vp-body::-webkit-scrollbar-thumb { background: rgba(255,248,240,.1); border-radius: 2px; }

.vp-section-label {
  font-size: .58rem; font-weight: 600; letter-spacing: .22em;
  text-transform: uppercase; color: rgba(255,248,240,.3); margin-bottom: 10px;
}

/* ── Quick Vibes ──────────────────────────────── */
.vibe-presets { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
.vibe-card {
  background: rgba(255,248,240,.05); border: 1px solid rgba(255,248,240,.09);
  border-radius: 12px; padding: 11px 10px 10px;
  cursor: pointer; text-align: left; transition: background .18s, border-color .18s;
}
.vibe-card:hover { background: rgba(255,248,240,.09); border-color: rgba(255,248,240,.18); }
.vibe-card.active { background: rgba(255,248,240,.1); border-color: var(--accent); }
.vc-icon { font-size: 1.25rem; line-height: 1; margin-bottom: 5px; }
.vc-name { font-size: .72rem; font-weight: 600; color: var(--cream); opacity: .65; line-height: 1.2; }

/* ── Background picker ────────────────────────── */
.bg-cat-pills { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
.bg-cat-pill {
  background: rgba(255,248,240,.05); border: 1px solid rgba(255,248,240,.09);
  color: var(--cream); font-family: 'Nunito Sans', sans-serif;
  font-size: .68rem; font-weight: 600; letter-spacing: .05em;
  padding: 5px 11px; border-radius: 20px; cursor: pointer;
  opacity: .45; transition: all .15s;
}
.bg-cat-pill:hover { opacity: .75; }
.bg-cat-pill.active { background: rgba(255,248,240,.1); border-color: rgba(255,248,240,.22); opacity: 1; }

.bg-thumbs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
.bg-thumb {
  aspect-ratio: 16/10; border-radius: 7px;
  background-size: cover; background-position: center;
  cursor: pointer; border: 2px solid transparent;
  transition: border-color .18s, transform .18s;
  overflow: hidden; position: relative;
}
.bg-thumb:hover { transform: scale(1.05); }
.bg-thumb.active { border-color: var(--accent); }
.bg-thumb-label {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: linear-gradient(transparent, rgba(0,0,0,.55));
  color: #fff; font-size: .58rem; font-weight: 600;
  padding: 5px 4px 3px; text-align: center;
  opacity: 0; transition: opacity .15s;
}
.bg-thumb:hover .bg-thumb-label { opacity: 1; }

/* ── Color swatches ───────────────────────────── */
.color-swatches { display: flex; gap: 10px; align-items: center; }
.color-swatch {
  width: 30px; height: 30px; border-radius: 50%;
  cursor: pointer; border: 2.5px solid transparent;
  transition: transform .18s, border-color .18s;
  flex-shrink: 0;
}
.color-swatch:hover { transform: scale(1.14); }
.color-swatch.active { border-color: rgba(255,248,240,.75); box-shadow: 0 0 10px rgba(255,248,240,.15); }

/* ── Atmosphere sliders ───────────────────────── */
.atmo-row { display: flex; flex-direction: column; gap: 6px; }
.atmo-top { display: flex; justify-content: space-between; align-items: center; }
.atmo-name { font-size: .72rem; font-weight: 600; color: rgba(255,248,240,.5); }
.atmo-val  { font-size: .68rem; color: rgba(255,248,240,.28); font-variant-numeric: tabular-nums; }
.atmo-range {
  width: 100%; height: 3px; -webkit-appearance: none; appearance: none;
  background: rgba(255,248,240,.14); border-radius: 2px; cursor: pointer; outline: none;
}
.atmo-range::-webkit-slider-thumb {
  -webkit-appearance: none; width: 14px; height: 14px;
  border-radius: 50%; background: var(--accent); cursor: pointer;
  box-shadow: 0 0 8px var(--accent-shadow);
}
.atmo-range::-moz-range-thumb { width:14px;height:14px;border:none;border-radius:50%;background:var(--accent); }

/* ════════════════════════════════════════════════
   SOUND MODAL  (light mode)
   ════════════════════════════════════════════════ */
.sound-modal { position: fixed; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; }
.sound-modal.hidden { display: none; }
.sm-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,.55); backdrop-filter: blur(6px); }
.sm-dialog { position: relative; z-index: 1; width: min(980px, 96vw); max-height: 88vh; background: #f7f5f2; border-radius: 24px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 32px 96px rgba(0,0,0,.5); }
.sm-header { display: flex; align-items: center; gap: 16px; padding: 18px 24px 16px; border-bottom: 1px solid #e8e0d6; background: #fff; flex-shrink: 0; }
.sm-title { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.25rem; font-weight: 300; color: #2d2419; flex: 1; }
.sm-master-row { display: flex; align-items: center; gap: 8px; }
.sm-master-row span { font-size: .8rem; color: #8a7a6a; }
.sm-master-vol { width: 110px; }
.sm-close { background: none; border: none; cursor: pointer; color: #8a7a6a; font-size: 1rem; padding: 6px 8px; border-radius: 8px; transition: background .15s, color .15s; line-height: 1; }
.sm-close:hover { background: #f0ebe3; color: #2d2419; }
.sm-body { display: grid; grid-template-columns: 168px 1fr 240px; flex: 1; min-height: 0; overflow: hidden; }
.sm-tabs { border-right: 1px solid #e8e0d6; overflow-y: auto; padding: 10px 8px; background: #faf8f5; display: flex; flex-direction: column; gap: 2px; }
.sm-tabs::-webkit-scrollbar { width: 3px; }
.sm-tabs::-webkit-scrollbar-thumb { background: #d8d0c8; border-radius: 2px; }
.sm-tab { display: block; width: 100%; padding: 9px 14px; border: none; background: transparent; text-align: left; cursor: pointer; border-radius: 8px; font-family: 'Nunito Sans', sans-serif; font-size: .8rem; font-weight: 600; color: #6b5a4a; transition: background .15s, color .15s; }
.sm-tab:hover { background: #ede5da; }
.sm-tab.active { background: #fdf0df; color: #8b5e1a; }
.sm-grid { padding: 16px; overflow-y: auto; background: #f7f5f2; }
.sm-grid::-webkit-scrollbar { width: 4px; }
.sm-grid::-webkit-scrollbar-thumb { background: #d8d0c8; border-radius: 2px; }
.sm-panel { display: none; }
.sm-panel.active { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; align-content: start; }
.sound-card { background: #fff; border: 1.5px solid #e8e0d6; border-radius: 14px; padding: 13px 12px 11px; cursor: pointer; transition: border-color .18s, box-shadow .18s, background .18s; user-select: none; }
.sound-card:hover { border-color: #d4a876; box-shadow: 0 2px 14px rgba(212,168,118,.15); }
.sound-card.active { background: #fff8ee; border-color: #d4a876; box-shadow: 0 2px 18px rgba(212,168,118,.22); }
.sc-top { display: flex; align-items: center; gap: 7px; margin-bottom: 9px; }
.sc-icon { font-size: 1.3rem; line-height: 1; flex-shrink: 0; }
.sc-name { font-size: .74rem; font-weight: 600; color: #2d2419; flex: 1; line-height: 1.25; }
.sc-toggle { width: 30px; height: 17px; border-radius: 9px; background: #d0c8be; border: none; cursor: pointer; position: relative; flex-shrink: 0; transition: background .2s; }
.sc-toggle::after { content: ''; position: absolute; width: 13px; height: 13px; background: #fff; border-radius: 50%; top: 2px; left: 2px; transition: transform .2s; box-shadow: 0 1px 3px rgba(0,0,0,.2); }
.sound-card.active .sc-toggle { background: #d4a876; }
.sound-card.active .sc-toggle::after { transform: translateX(13px); }
.sc-vol { width: 100%; height: 3px; -webkit-appearance: none; appearance: none; background: #e8e0d6; border-radius: 2px; cursor: pointer; outline: none; opacity: 0; transition: opacity .2s; pointer-events: none; }
.sound-card.active .sc-vol { opacity: 1; pointer-events: auto; }
.sc-vol::-webkit-slider-thumb { -webkit-appearance: none; width: 13px; height: 13px; border-radius: 50%; background: #d4a876; cursor: pointer; box-shadow: 0 0 5px rgba(212,168,118,.4); }
.sc-vol::-moz-range-thumb { width:13px;height:13px;border:none;border-radius:50%;background:#d4a876; }
.sm-mix { border-left: 1px solid #e8e0d6; display: flex; flex-direction: column; background: #faf8f5; overflow: hidden; }
.sm-mix-section { padding: 14px 16px; border-bottom: 1px solid #e8e0d6; }
.sm-mix-section:last-child { border-bottom: none; flex: 1; overflow-y: auto; }
.sm-mix-section::-webkit-scrollbar { width: 3px; }
.sm-mix-section::-webkit-scrollbar-thumb { background: #d8d0c8; border-radius: 2px; }
.sm-section-label { font-size: .6rem; font-weight: 600; letter-spacing: .2em; text-transform: uppercase; color: #9a8878; margin-bottom: 10px; }
.mix-master-row { display: flex; align-items: center; gap: 8px; }
.mix-master-row span { font-size: .8rem; color: #6b5a4a; }
.mix-master-range { flex: 1; height: 3px; -webkit-appearance: none; appearance: none; background: #e8e0d6; border-radius: 2px; cursor: pointer; outline: none; }
.mix-master-range::-webkit-slider-thumb { -webkit-appearance: none; width: 13px; height: 13px; border-radius: 50%; background: #d4a876; cursor: pointer; }
.mix-master-range::-moz-range-thumb { width:13px;height:13px;border:none;border-radius:50%;background:#d4a876; }
.mix-list { display: flex; flex-direction: column; gap: 7px; }
.mix-empty { font-size: .78rem; color: #b0a090; font-style: italic; text-align: center; padding: 12px 0; }
.asi { background: #fff; border: 1px solid #e8e0d6; border-radius: 10px; padding: 9px 10px; display: flex; flex-direction: column; gap: 6px; }
.asi-top { display: flex; align-items: center; gap: 6px; }
.asi-icon { font-size: 1rem; flex-shrink: 0; }
.asi-name { font-size: .76rem; font-weight: 600; color: #2d2419; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.asi-remove { background: none; border: none; cursor: pointer; color: #b0a090; font-size: .75rem; padding: 2px 4px; border-radius: 4px; flex-shrink: 0; transition: color .15s; line-height: 1; }
.asi-remove:hover { color: #e05555; }
.asi-vol { width: 100%; height: 3px; -webkit-appearance: none; appearance: none; background: #e8e0d6; border-radius: 2px; cursor: pointer; outline: none; }
.asi-vol::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #d4a876; cursor: pointer; }
.asi-vol::-moz-range-thumb { width:12px;height:12px;border:none;border-radius:50%;background:#d4a876; }
.preset-list { display: flex; flex-direction: column; gap: 5px; }
.preset-row { display: flex; align-items: center; gap: 5px; }
.preset-load-btn { flex: 1; padding: 7px 10px; background: #fff; border: 1px solid #e8e0d6; border-radius: 8px; cursor: pointer; font-size: .76rem; color: #2d2419; text-align: left; transition: background .15s, border-color .15s; font-family: 'Nunito Sans', sans-serif; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.preset-load-btn:hover { background: #fff8ee; border-color: #d4a876; }
.preset-del-btn { background: none; border: none; cursor: pointer; color: #b0a090; font-size: .75rem; padding: 5px; border-radius: 4px; flex-shrink: 0; transition: color .15s; }
.preset-del-btn:hover { color: #e05555; }
.preset-save-row { display: flex; gap: 6px; margin-top: 8px; }
.preset-name-input { flex: 1; padding: 7px 10px; border: 1px solid #e8e0d6; border-radius: 8px; font-family: 'Nunito Sans', sans-serif; font-size: .76rem; color: #2d2419; background: #fff; outline: none; transition: border-color .15s; min-width: 0; }
.preset-name-input::placeholder { color: #b0a090; }
.preset-name-input:focus { border-color: #d4a876; }
.preset-save-btn { background: #d4a876; border: none; border-radius: 8px; color: #fff; padding: 7px 11px; font-size: .74rem; cursor: pointer; font-family: 'Nunito Sans', sans-serif; font-weight: 600; transition: opacity .15s; flex-shrink: 0; }
.preset-save-btn:hover { opacity: .85; }

/* ── Task tabs ──────────────────────────────────── */
.task-tabs { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 14px; }
.task-tab {
  background: rgba(255,248,240,.04); border: 1px solid rgba(255,248,240,.1);
  border-radius: 8px; padding: 4px 9px; font-size: .66rem; font-weight: 600;
  color: rgba(245,239,230,.5); cursor: pointer; display: inline-flex;
  align-items: center; gap: 4px; font-family: 'Nunito Sans', sans-serif;
  transition: all .15s ease;
}
.task-tab:hover { color: var(--cream); border-color: rgba(255,248,240,.2); }
.task-tab.active { background: var(--accent-card-bg); border-color: var(--accent-card-br); color: var(--accent); }
.task-tab[data-tab="done"].active { background: rgba(138,171,126,.18); border-color: rgba(138,171,126,.45); color: #8aab7e; }
.tab-badge {
  background: var(--accent); color: #16100a;
  border-radius: 6px; padding: 1px 5px; font-size: .58rem; font-weight: 700;
  display: none;
}
.tab-badge.visible { display: inline-block; }

.task-group-tabs {
  display: flex; flex-wrap: wrap; gap: 6px;
  margin-bottom: 12px;
}
.task-group-tab {
  background: rgba(255,248,240,.03); border: 1px solid rgba(255,248,240,.1);
  border-radius: 9px; padding: 6px 10px; font-size: .66rem; font-weight: 600;
  color: rgba(245,239,230,.54); cursor: pointer;
  display: inline-flex; justify-content: center; align-items: center; gap: 5px;
  font-family: 'Nunito Sans', sans-serif; transition: all .15s ease;
}
.task-group-tab:hover { color: var(--cream); border-color: rgba(255,248,240,.2); }
.task-group-tab.active {
  background: rgba(255,248,240,.1);
  border-color: rgba(255,248,240,.24);
  color: var(--cream);
}
.task-group-badge {
  min-width: 16px; height: 16px; border-radius: 999px;
  padding: 0 5px; display: inline-flex; align-items: center; justify-content: center;
  font-size: .56rem; font-weight: 700; color: #16100a;
  background: var(--accent);
}

.task-group-create-row { display: flex; gap: 8px; margin-bottom: 10px; }
.task-group-input {
  flex: 1; background: rgba(255,248,240,.06); border: 1px solid var(--border);
  border-radius: 9px; color: var(--cream); font-family: 'Nunito Sans', sans-serif;
  font-size: .72rem; padding: 7px 10px; outline: none;
}
.task-group-input::placeholder { color: rgba(245,239,230,.35); }
.task-group-input:focus { border-color: var(--accent-subtle); }
.task-group-add-btn {
  background: var(--accent); border: none; color: #16100a;
  border-radius: 9px; padding: 0 11px; cursor: pointer;
  font-size: .66rem; font-weight: 700; letter-spacing: .05em;
  text-transform: uppercase; font-family: 'Nunito Sans', sans-serif;
  white-space: nowrap; transition: opacity .15s ease;
}
.task-group-add-btn:hover { opacity: .84; }

.task-controls-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  margin-bottom: 10px;
}
.task-select {
  background: rgba(255,248,240,.06); border: 1px solid var(--border);
  border-radius: 9px; color: var(--cream); font-family: 'Nunito Sans', sans-serif;
  font-size: .72rem; padding: 7px 10px; outline: none;
}
.task-select:focus { border-color: var(--accent-subtle); }
.task-select option { color: #16100a; }

.task-meta {
  font-size: .56rem; font-weight: 700; letter-spacing: .08em;
  text-transform: uppercase; color: rgba(245,239,230,.5);
  border: 1px solid rgba(245,239,230,.14); border-radius: 999px;
  padding: 2px 7px; white-space: nowrap; flex-shrink: 0;
}

/* ── Task date chip ─────────────────────────────── */
.task-date-btn {
  background: transparent; border: none; color: var(--cream);
  opacity: .25; cursor: pointer; font-size: .72rem; padding: 2px 4px;
  border-radius: 4px; transition: opacity .15s; flex-shrink: 0;
}
.task-item:hover .task-date-btn { opacity: .55; }
.task-date-chip {
  font-size: .62rem; background: var(--accent-card-bg);
  border: 1px solid var(--accent-card-br); color: var(--accent);
  border-radius: 6px; padding: 2px 7px; cursor: pointer;
  white-space: nowrap; flex-shrink: 0;
  font-family: 'Nunito Sans', sans-serif; font-weight: 600;
  transition: opacity .15s;
}
.task-date-chip.overdue { background: rgba(201,123,120,.15); border-color: rgba(201,123,120,.4); color: #c97b78; }
.task-date-input { display: none; }

/* ── Clear all (Done tab) ───────────────────────── */
.task-clear-row { display: flex; justify-content: flex-end; margin-bottom: 8px; }
.task-clear-all {
  background: transparent; border: none; color: rgba(245,239,230,.28);
  font-family: 'Nunito Sans', sans-serif; font-size: .62rem;
  letter-spacing: .04em; cursor: pointer; padding: 2px 4px;
  transition: color .15s;
}
.task-clear-all:hover { color: rgba(245,239,230,.55); }

/* ── Task section headers ───────────────────────── */
.task-section-header {
  font-size: .6rem; font-weight: 700; letter-spacing: .16em;
  text-transform: uppercase; color: rgba(245,239,230,.38);
  padding: 10px 2px 4px; list-style: none;
}

/* ── Task edit button ───────────────────────────── */
.task-edit-btn {
  background: transparent; border: none; color: var(--cream);
  opacity: 0; cursor: pointer; font-size: .78rem; padding: 2px 6px;
  border-radius: 4px; transition: opacity .15s, background .15s;
  flex-shrink: 0; line-height: 1;
}
.task-item:hover .task-edit-btn { opacity: .45; }
.task-edit-btn:hover { opacity: 1 !important; background: rgba(255,248,240,.08); }

/* ── Task drawer ────────────────────────────────── */
.task-drawer-backdrop {
  position: fixed; inset: 0; z-index: 890;
  background: rgba(0,0,0,.22); opacity: 0; pointer-events: none;
  transition: opacity .3s ease;
}
.task-drawer-backdrop.visible { opacity: 1; pointer-events: auto; }

.task-drawer {
  position: fixed; top: 0; right: 0; bottom: 0; z-index: 895;
  width: 320px; background: rgba(14,10,6,.96);
  backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
  border-left: 1px solid rgba(255,248,240,.08);
  box-shadow: -24px 0 72px rgba(0,0,0,.5);
  display: flex; flex-direction: column;
  transform: translateX(100%);
  transition: transform .36s cubic-bezier(.4,0,.2,1);
}
.task-drawer.open { transform: translateX(0); }

.td-header {
  display: flex; align-items: center; padding: 22px 22px 16px;
  border-bottom: 1px solid rgba(255,248,240,.07); flex-shrink: 0;
}
.td-title {
  font-size: .6rem; font-weight: 700; letter-spacing: .22em;
  text-transform: uppercase; color: rgba(245,239,230,.38); flex: 1;
}
.td-close {
  background: none; border: none; color: rgba(255,248,240,.35);
  cursor: pointer; font-size: .95rem; padding: 6px 8px; border-radius: 8px;
  transition: color .15s, background .15s; line-height: 1;
}
.td-close:hover { color: var(--cream); background: rgba(255,248,240,.06); }

.td-body {
  flex: 1; overflow-y: auto; padding: 20px 22px;
  display: flex; flex-direction: column; gap: 18px;
}
.td-body::-webkit-scrollbar { width: 3px; }
.td-body::-webkit-scrollbar-thumb { background: rgba(255,248,240,.1); border-radius: 2px; }

.td-field-group { display: flex; flex-direction: column; gap: 8px; }
.td-label {
  font-size: .6rem; font-weight: 700; letter-spacing: .15em;
  text-transform: uppercase; color: rgba(245,239,230,.35);
}

.td-task-name {
  width: 100%; background: rgba(255,248,240,.07); border: 1px solid rgba(255,248,240,.13);
  border-radius: 10px; color: var(--cream); font-family: 'Nunito Sans', sans-serif;
  font-size: .85rem; font-weight: 300; padding: 12px 14px;
  outline: none; resize: none; line-height: 1.5;
  transition: border-color .2s;
}
.td-task-name:focus { border-color: var(--accent-subtle); }

.td-date-row {
  display: flex; align-items: center;
  background: rgba(255,248,240,.07); border: 1px solid rgba(255,248,240,.13);
  border-radius: 10px; overflow: hidden; padding: 0 12px;
  transition: border-color .2s;
}
.td-date-row:focus-within { border-color: var(--accent-subtle); }
.td-date-text {
  flex: 1; background: transparent; border: none; color: var(--cream);
  font-family: 'Nunito Sans', sans-serif; font-size: .8rem;
  padding: 10px 0; outline: none; cursor: pointer; min-width: 0;
}
.td-date-text::placeholder { color: rgba(245,239,230,.28); }
.td-date-input { display: none; }
.td-date-icon {
  background: transparent; border: none; color: rgba(245,239,230,.35);
  cursor: pointer; font-size: .9rem; padding: 4px 0 4px 8px; line-height: 1;
  transition: color .15s; flex-shrink: 0;
}
.td-date-icon:hover { color: var(--cream); }

.td-select {
  width: 100%; background: rgba(255,248,240,.07); border: 1px solid rgba(255,248,240,.13);
  border-radius: 10px; color: var(--cream); font-family: 'Nunito Sans', sans-serif;
  font-size: .8rem; padding: 10px 14px; outline: none;
  transition: border-color .2s; cursor: pointer;
}
.td-select:focus { border-color: var(--accent-subtle); }
.td-select option { color: #16100a; background: #f5efe6; }

.td-footer {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 22px; border-top: 1px solid rgba(255,248,240,.07); flex-shrink: 0;
}
.td-btn-delete {
  background: rgba(201,123,120,.18); border: 1px solid rgba(201,123,120,.35);
  color: #c97b78; font-family: 'Nunito Sans', sans-serif;
  font-size: .78rem; font-weight: 600; padding: 9px 20px;
  border-radius: 10px; cursor: pointer; transition: background .2s, border-color .2s;
}
.td-btn-delete:hover { background: rgba(201,123,120,.30); }
.td-btn-save {
  background: var(--accent); border: none; color: #16100a;
  font-family: 'Nunito Sans', sans-serif; font-size: .78rem; font-weight: 700;
  padding: 9px 22px; border-radius: 10px; cursor: pointer;
  transition: opacity .15s, transform .1s;
}
.td-btn-save:hover { opacity: .88; transform: scale(1.04); }

/* ── Sidebar view switcher ──────────────────────── */
.sidebar-tabs {
  display: flex; gap: 3px; background: rgba(255,248,240,.05);
  border: 1px solid var(--border); border-radius: 12px;
  padding: 3px; margin-bottom: 16px;
}
.sidebar-tab {
  flex: 1; background: transparent; border: none; color: var(--cream);
  font-family: 'Nunito Sans', sans-serif; font-size: .68rem; font-weight: 600;
  letter-spacing: .08em; text-transform: uppercase; padding: 6px 10px;
  border-radius: 9px; cursor: pointer; opacity: .45; transition: all .2s ease;
}
.sidebar-tab.active { background: rgba(255,248,240,.1); opacity: 1; }

/* ── Group chips ────────────────────────────────── */
.group-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
.group-chip {
  background: rgba(255,248,240,.05); border: 1px solid rgba(255,248,240,.12);
  border-radius: 20px; padding: 5px 12px; font-size: .68rem; font-weight: 600;
  color: rgba(245,239,230,.5); cursor: pointer; font-family: 'Nunito Sans', sans-serif;
  transition: all .15s; white-space: nowrap; display: inline-flex; align-items: center; gap: 6px;
}
.group-chip:hover { color: var(--cream); border-color: rgba(255,248,240,.25); }
.group-chip.active { background: var(--accent-card-bg); border-color: var(--accent-card-br); color: var(--accent); }
.group-chip-del {
  background: none; border: none; color: inherit; opacity: .5; cursor: pointer;
  font-size: .7rem; padding: 0; line-height: 1; transition: opacity .15s;
}
.group-chip-del:hover { opacity: 1; }

/* ── Group add row ──────────────────────────────── */
.group-add-row { display: flex; gap: 8px; margin-bottom: 14px; }
.group-add-input {
  flex: 1; background: rgba(255,248,240,.06); border: 1px solid var(--border);
  border-radius: 10px; color: var(--cream); font-family: 'Nunito Sans', sans-serif;
  font-size: .78rem; padding: 8px 12px; outline: none; transition: border-color .2s; min-width: 0;
}
.group-add-input::placeholder { color: rgba(245,239,230,.25); }
.group-add-input:focus { border-color: var(--accent-subtle); }
.group-add-btn {
  background: rgba(255,248,240,.08); border: 1px solid rgba(255,248,240,.14);
  color: var(--cream); font-family: 'Nunito Sans', sans-serif;
  font-size: .7rem; font-weight: 700; padding: 0 14px;
  border-radius: 10px; cursor: pointer; transition: background .15s; flex-shrink: 0;
}
.group-add-btn:hover { background: rgba(255,248,240,.15); }

/* ── Group tag on task item ─────────────────────── */
.task-group-tag {
  font-size: .58rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
  color: rgba(245,239,230,.3); border: 1px solid rgba(245,239,230,.1);
  border-radius: 999px; padding: 2px 7px; white-space: nowrap; flex-shrink: 0;
}

/* ── Responsive ───────────────────────────────── */

/* ── What's New Banner ──────────────────────────── */
.whats-new-banner {
  position: fixed; top: 0; left: 0; right: 0; z-index: 999;
  background: linear-gradient(90deg, rgba(212,168,118,.18) 0%, rgba(212,168,118,.10) 100%);
  border-bottom: 1px solid rgba(212,168,118,.30);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  padding: 10px 20px; display: flex; align-items: center; gap: 12px;
  transform: translateY(-100%); transition: transform .4s cubic-bezier(.4,0,.2,1);
}
.whats-new-banner.visible { transform: translateY(0); }
.wnb-icon { font-size: 1rem; flex-shrink: 0; }
.wnb-text { flex: 1; font-size: .75rem; color: var(--cream); line-height: 1.4; }
.wnb-text strong { color: var(--accent); font-weight: 700; margin-right: 6px; }
.wnb-dismiss {
  background: rgba(212,168,118,.18); border: 1px solid rgba(212,168,118,.30);
  color: var(--accent); font-family: 'Nunito Sans', sans-serif;
  font-size: .65rem; font-weight: 700; letter-spacing: .08em;
  padding: 5px 12px; border-radius: 20px; cursor: pointer; flex-shrink: 0;
  transition: background .15s;
}
.wnb-dismiss:hover { background: rgba(212,168,118,.30); }

/* Tablet: tighten padding */
@media (max-width: 900px) {
  .app { padding: 20px 24px; gap: 16px; }
}

/* Mobile ≤ 680px */
@media (max-width: 680px) {
  html, body { overflow-y: auto; }

  /* Layout */
  .app {
    grid-template-columns: 1fr;
    height: auto; min-height: 100vh;
    padding: 16px; gap: 12px;
  }
  .sidebar { grid-row: 3; }

  /* Header: mode-toggle wraps to its own full-width row */
  .header { row-gap: 8px; }
  .mode-toggle { flex: 0 0 100%; }
  .mode-btn { flex: 1; padding: 8px 4px; }
  .hdr-btn { padding: 6px 11px; font-size: .65rem; }

  /* Timer */
  .timer-card { padding: 28px 20px; gap: 20px; }
  .time-display { font-size: 4rem; }

  /* Sound modal: bottom sheet */
  .sound-modal { align-items: flex-end; }
  .sm-dialog {
    width: 100%; max-height: 90dvh;
    border-radius: 20px 20px 0 0;
  }
  .sm-header { flex-wrap: wrap; gap: 8px 10px; padding: 14px 16px 12px; }
  .sm-title { order: 1; flex: 1; }
  .sm-close { order: 2; }
  .sm-master-row { order: 3; flex: 0 0 100%; }
  .sm-master-vol { flex: 1; width: auto; }
  .sm-body {
    grid-template-columns: 1fr;
    overflow-y: auto; overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
  }
  .sm-tabs {
    flex-direction: row; flex-wrap: nowrap;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    border-right: none; border-bottom: 1px solid #e8e0d6;
    padding: 8px; gap: 3px;
    position: sticky; top: 0; z-index: 1;
    background: #faf8f5;
  }
  .sm-tabs::-webkit-scrollbar { display: none; }
  .sm-tab { flex-shrink: 0; white-space: nowrap; padding: 8px 12px; font-size: .78rem; }
  .sm-grid { overflow-y: visible; max-height: none; padding: 12px; }
  .sm-panel.active { grid-template-columns: repeat(2, 1fr); }
  .sm-mix { border-left: none; border-top: 1px solid #e8e0d6; overflow-y: visible; }
  .sm-mix-section:last-child { overflow-y: visible; max-height: none; }

  /* Vibe panel */

<script>
'use strict';
// ═══════════════════════════════════════════════════════════════
//  TIMER ENGINE
// ═══════════════════════════════════════════════════════════════
const CIRC = 2 * Math.PI * 108;
const MODES = {
  work:  { label: 'Focus Time',  secs: 25*60, break: false },
  short: { label: 'Short Break', secs:  5*60, break: true  },
  long:  { label: 'Long Break',  secs: 15*60, break: true  },
};
let mode = 'work', total = MODES.work.secs, remaining = total;
let running = false, ticker = null, sessions = 0;

const timeEl  = document.getElementById('timeDisplay');
const labelEl = document.getElementById('modeLabel');
const ringEl  = document.getElementById('ring');
const playBtn = document.getElementById('playBtn');
const pipsEl  = document.getElementById('pips');

const fmt = s => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
function refreshRing() { ringEl.style.strokeDashoffset = CIRC * (1 - remaining/total); }

function applyMode(m) {
  mode = m; total = remaining = MODES[m].secs;
  running = false; clearInterval(ticker);
  playBtn.textContent = '▶';
  timeEl.textContent = fmt(remaining);
  labelEl.textContent = MODES[m].label;
  ringEl.style.strokeDashoffset = 0;
  const isBreak = MODES[m].break;
  ringEl.classList.toggle('is-break', isBreak);
  playBtn.classList.toggle('is-break', isBreak);
  labelEl.classList.toggle('is-break', isBreak);
  document.body.classList.toggle('mode-work',  !isBreak);
  document.body.classList.toggle('mode-break',  isBreak);
  document.querySelectorAll('.mode-btn').forEach(b => {
    b.classList.remove('active','break-active');
    if (b.dataset.mode === m) b.classList.add(isBreak ? 'break-active' : 'active');
  });
}

function tick() {
  remaining = Math.max(0, remaining - 1);
  timeEl.textContent = fmt(remaining); refreshRing();
  if (remaining === 0) {
    clearInterval(ticker); running = false; playBtn.textContent = '▶';
    chime();
    if (!MODES[mode].break) { sessions = Math.min(sessions+1, 4); refreshPips(true); }
    setTimeout(() => applyMode(MODES[mode].break ? 'work' : 'short'), 1000);
  }
}

function togglePlay() {
  if (running) { clearInterval(ticker); running = false; playBtn.textContent = '▶'; }
  else { ticker = setInterval(tick, 1000); running = true; playBtn.textContent = '⏸'; }
}

function refreshPips(bounce = false) {
  pipsEl.querySelectorAll('.pip').forEach((p, i) => {
    const done = i < sessions; p.classList.toggle('done', done);
    if (done && bounce && i === sessions-1) { p.classList.remove('bounce'); void p.offsetWidth; p.classList.add('bounce'); }
  });
}

function chime() {
  try {
    const ctx = getCtx();
    [523.25, 659.25, 783.99].forEach((f, i) => {
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.type = 'sine'; osc.frequency.value = f;
      g.gain.setValueAtTime(0, ctx.currentTime + i*.18);
      g.gain.linearRampToValueAtTime(0.12, ctx.currentTime + i*.18 + .05);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*.18 + .7);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(ctx.currentTime + i*.18); osc.stop(ctx.currentTime + i*.18 + .8);
    });
  } catch(e) {}
}

playBtn.addEventListener('click', togglePlay);
document.getElementById('resetBtn').addEventListener('click', () => applyMode(mode));
document.getElementById('skipBtn').addEventListener('click', () => {
  clearInterval(ticker); running = false;
  if (!MODES[mode].break) { sessions = Math.min(sessions+1,4); refreshPips(true); }
  applyMode(MODES[mode].break ? 'work' : 'short');
});
document.querySelectorAll('.mode-btn').forEach(b => b.addEventListener('click', () => applyMode(b.dataset.mode)));
applyMode('work');

// ═══════════════════════════════════════════════════════════════
//  MULTI-SOUND AUDIO ENGINE
// ═══════════════════════════════════════════════════════════════
let audioCtx = null, masterGain = null;
const activeSounds = new Map();

function getCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = parseFloat(document.getElementById('masterVolSlider').value);
    masterGain.connect(audioCtx.destination);
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

const R = Math.random;
function tryStop(s) { try { s.stop(); } catch(e){} }
function bq(c,t,f,q=.7) { const n=c.createBiquadFilter(); n.type=t; n.frequency.value=f; n.Q.value=q; return n; }

function makeBuf(ctx, type) {
  const len=ctx.sampleRate*4, buf=ctx.createBuffer(1,len,ctx.sampleRate), d=buf.getChannelData(0);
  if (type==='white') { for(let i=0;i<len;i++) d[i]=R()*2-1; }
  else if (type==='pink') {
    let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
    for(let i=0;i<len;i++){const w=R()*2-1;b0=.99886*b0+w*.0555179;b1=.99332*b1+w*.0750759;b2=.969*b2+w*.153852;b3=.8665*b3+w*.3104856;b4=.55*b4+w*.5329522;b5=-.7616*b5-w*.016898;d[i]=(b0+b1+b2+b3+b4+b5+b6+w*.5362)*.11;b6=w*.115926;}
  } else {
    let last=0; for(let i=0;i<len;i++){const w=R()*2-1;d[i]=(last+.02*w)/1.02;last=d[i];d[i]*=3.5;}
  }
  return buf;
}
function ns(c,t){ const s=c.createBufferSource(); s.buffer=makeBuf(c,t); s.loop=true; return s; }
function pulse(c,o,t,f,v,d){ const n=c.createOscillator(),g=c.createGain(); n.type=t; n.frequency.value=f; g.gain.setValueAtTime(v,c.currentTime); g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d); n.connect(g);g.connect(o); n.start();n.stop(c.currentTime+d+.01); }

function addSound(id, vol=.5) {
  if (activeSounds.has(id)) return;
  const ctx=getCtx(), gn=ctx.createGain();
  gn.gain.setValueAtTime(0,ctx.currentTime); gn.connect(masterGain);
  gn.gain.setTargetAtTime(vol,ctx.currentTime,.4);
  activeSounds.set(id, { stopFn: GENERATORS[id](ctx,gn), gainNode:gn, vol });
  updateSoundUI();
}
function removeSound(id) {
  if (!activeSounds.has(id)) return;
  const {stopFn,gainNode}=activeSounds.get(id);
  gainNode.gain.setTargetAtTime(0,audioCtx.currentTime,.3);
  setTimeout(()=>{ stopFn(); try{gainNode.disconnect();}catch(e){} },1000);
  activeSounds.delete(id); updateSoundUI();
}
function setSoundVol(id,vol) {
  if (!activeSounds.has(id)) return;
  const e=activeSounds.get(id); e.gainNode.gain.setTargetAtTime(vol,audioCtx.currentTime,.08); e.vol=vol;
}
function toggleSound(id,vol) { activeSounds.has(id)?removeSound(id):addSound(id,vol??0.5); }

// ── Sound generators ───────────────────────────
const GENERATORS={};
function rainBase(c,o,nt,hp,lp){ const s=ns(c,nt),h=bq(c,'highpass',hp),l=bq(c,'lowpass',lp,.4); s.connect(h);h.connect(l);l.connect(o);s.start();return s; }

GENERATORS['light-rain']=(c,o)=>{const s=rainBase(c,o,'white',300,1400);let on=true;const d=()=>{if(!on)return;pulse(c,o,'sine',700+R()*500,.055,.14);setTimeout(d,900+R()*1500);};d();return()=>{on=false;tryStop(s);};};
GENERATORS['heavy-rain']=(c,o)=>{const s=rainBase(c,o,'pink',400,2000);let on=true;const d=()=>{if(!on)return;pulse(c,o,'sine',650+R()*600,.068,.17);setTimeout(d,100+R()*360);};d();return()=>{on=false;tryStop(s);};};
GENERATORS['rain-window']=(c,o)=>{const s=rainBase(c,o,'white',600,3000);let on=true;const t=()=>{if(!on)return;const f=900+R()*1100,oo=c.createOscillator(),g=c.createGain();oo.type='triangle';oo.frequency.setValueAtTime(f,c.currentTime);oo.frequency.exponentialRampToValueAtTime(f*.8,c.currentTime+.12);g.gain.setValueAtTime(.08,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.18);oo.connect(g);g.connect(o);oo.start();oo.stop(c.currentTime+.2);setTimeout(t,350+R()*1000);};t();return()=>{on=false;tryStop(s);};};
GENERATORS['rain-roof']=(c,o)=>{const s=rainBase(c,o,'white',500,2200);let on=true;const d=()=>{if(!on)return;const f=1200+R()*800,oo=c.createOscillator(),g=c.createGain();oo.type='triangle';oo.frequency.setValueAtTime(f,c.currentTime);oo.frequency.exponentialRampToValueAtTime(f*.85,c.currentTime+.15);g.gain.setValueAtTime(.08,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.2);oo.connect(g);g.connect(o);oo.start();oo.stop(c.currentTime+.22);setTimeout(d,160+R()*600);};d();return()=>{on=false;tryStop(s);};};
GENERATORS['rain-thunder']=(c,o)=>{const s=rainBase(c,o,'pink',300,1800);let on=true;const d=()=>{if(!on)return;pulse(c,o,'sine',700+R()*500,.055,.15);setTimeout(d,140+R()*500);};d();const th=()=>{if(!on)return;setTimeout(()=>{if(!on)return;const ro=c.createOscillator(),rg=c.createGain();ro.type='sine';ro.frequency.value=38+R()*55;rg.gain.setValueAtTime(0,c.currentTime);rg.gain.linearRampToValueAtTime(.22,c.currentTime+.12);rg.gain.exponentialRampToValueAtTime(.01,c.currentTime+1.8);ro.connect(rg);rg.connect(o);ro.start();ro.stop(c.currentTime+2);const cs=ns(c,'white'),cf=bq(c,'highpass',3200),cg=c.createGain();cg.gain.setValueAtTime(0,c.currentTime);cg.gain.linearRampToValueAtTime(.28,c.currentTime+.04);cg.gain.exponentialRampToValueAtTime(.001,c.currentTime+.45);cs.connect(cf);cf.connect(cg);cg.connect(o);cs.start();cs.stop(c.currentTime+.5);},2000+R()*4000);setTimeout(th,6000+R()*5000);};th();return()=>{on=false;tryStop(s);};};
GENERATORS['distant-thunder']=(c,o)=>{const s=ns(c,'pink'),l=bq(c,'lowpass',180,.5);s.connect(l);l.connect(o);s.start();let on=true;const b=()=>{if(!on)return;const ro=c.createOscillator(),rg=c.createGain();ro.type='sine';ro.frequency.value=28+R()*35;rg.gain.setValueAtTime(0,c.currentTime);rg.gain.linearRampToValueAtTime(.18,c.currentTime+.4);rg.gain.exponentialRampToValueAtTime(.001,c.currentTime+3.5);ro.connect(rg);rg.connect(o);ro.start();ro.stop(c.currentTime+4);setTimeout(b,8000+R()*9000);};b();return()=>{on=false;tryStop(s);};};
GENERATORS['forest']=(c,o)=>{const s=ns(c,'pink'),l=bq(c,'lowpass',500);s.connect(l);l.connect(o);s.start();let on=true;const bird=()=>{if(!on)return;const n=2+Math.floor(R()*3);for(let i=0;i<n;i++)setTimeout(()=>{if(!on)return;const f=1600+R()*1400,ob=c.createOscillator(),bg=c.createGain();ob.type='sine';ob.frequency.setValueAtTime(f,c.currentTime);ob.frequency.linearRampToValueAtTime(f*1.25,c.currentTime+.09);ob.frequency.linearRampToValueAtTime(f,c.currentTime+.18);bg.gain.setValueAtTime(0,c.currentTime);bg.gain.linearRampToValueAtTime(.04,c.currentTime+.02);bg.gain.linearRampToValueAtTime(0,c.currentTime+.2);ob.connect(bg);bg.connect(o);ob.start();ob.stop(c.currentTime+.22);},i*160);setTimeout(bird,1800+R()*3800);};bird();return()=>{on=false;tryStop(s);};};
GENERATORS['wind']=(c,o)=>{const wg=c.createGain(),s=ns(c,'pink'),h=bq(c,'highpass',80),l=bq(c,'lowpass',600);s.connect(h);h.connect(l);l.connect(wg);wg.connect(o);s.start();const lfo=c.createOscillator(),lg=c.createGain();lfo.type='sine';lfo.frequency.value=.1;lg.gain.value=.22;lfo.connect(lg);lg.connect(wg.gain);wg.gain.value=.35;lfo.start();return()=>{tryStop(s);tryStop(lfo);};};
GENERATORS['ocean']=(c,o)=>{const wg=c.createGain(),s=ns(c,'pink'),l=bq(c,'lowpass',800);wg.gain.value=.1;s.connect(l);l.connect(wg);wg.connect(o);s.start();let on=true,ph=0;const wave=()=>{if(!on)return;const t=c.currentTime,dur=3.5+R()*1.5;wg.gain.cancelScheduledValues(t);if(ph%2===0){wg.gain.setValueAtTime(.08,t);wg.gain.linearRampToValueAtTime(.75,t+dur*.4);wg.gain.linearRampToValueAtTime(.1,t+dur);}else{wg.gain.setValueAtTime(.1,t);wg.gain.linearRampToValueAtTime(.06,t+dur);}ph++;setTimeout(wave,dur*1000);};wave();return()=>{on=false;tryStop(s);};};
GENERATORS['river']=(c,o)=>{

function saveTheme() { localStorage.setItem('focus-theme', JSON.stringify(userTheme)); }

function applyBackground(bg, animate=true) {
  const bgEl   = document.getElementById('bg');
  const prevEl = document.getElementById('bg-prev');
  if (!bg) return;
  if (animate) {
    prevEl.style.backgroundImage    = bgEl.style.backgroundImage;
    prevEl.style.backgroundPosition = bgEl.style.backgroundPosition || 'center 40%';
    bgEl.style.opacity = '0';
    setTimeout(() => {
      bgEl.style.backgroundImage    = `url('${bg.url}')`;
      bgEl.style.backgroundPosition = bg.pos || 'center';
      bgEl.style.opacity = '1';
    }, 350);
  } else {
    bgEl.style.backgroundImage    = `url('${bg.url}')`;
    bgEl.style.backgroundPosition = bg.pos || 'center';
  }
}

function applyColorTheme(t) {
  const themeClasses = COLOR_THEMES.map(x=>x.cls).filter(Boolean);
  document.body.classList.remove(...themeClasses);
  if (t && t.cls) document.body.classList.add(t.cls);
}

function applyBlur(px) {
  document.documentElement.style.setProperty('--glass-blur', px + 'px');
  document.getElementById('blurVal').textContent = px + 'px';
  document.getElementById('blurSlider').value = px;
}

function applyDim(val) {
  document.documentElement.style.setProperty('--overlay-opacity', val);
  document.getElementById('dimVal').textContent = Math.round(val*100) + '%';
  document.getElementById('dimSlider').value = val;
}

function applyTheme(animate=true) {
  applyBackground(BG_MAP.get(userTheme.bgId), animate);
  applyColorTheme(COLOR_MAP.get(userTheme.colorId));
  applyBlur(userTheme.blur);
  applyDim(userTheme.dim);
  refreshVibePanel();
}

let activeTab   = 'now';
let activeGroup = 'all';
let sidebarView = 'tasks';

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Task Groups ────────────────────────────────
const DEFAULT_GROUPS = [{ id: 'work', label: 'Work' }, { id: 'personal', label: 'Personal' }];

function loadTaskGroups() {
  try {
    const saved = JSON.parse(localStorage.getItem('focus-task-groups') || '[]');
    const map = new Map(DEFAULT_GROUPS.map(g => [g.id, g]));
    saved.forEach(g => { if (g.id && !map.has(g.id)) map.set(g.id, g); });
    return [...map.values()];
  } catch(_) { return [...DEFAULT_GROUPS]; }
}

function saveTaskGroups() { localStorage.setItem('focus-task-groups', JSON.stringify(taskGroups)); }

let taskGroups = loadTaskGroups();

function normalizeTask(task) {
  return {
    text:      task.text      || '',
    done:      !!task.done,
    bucket:    task.bucket    || 'now',
    group:     task.group     || 'work',
    dueDate:   task.dueDate   || null,
    createdAt: task.createdAt || new Date().toISOString(),
  };
}

function saveTasks() { localStorage.setItem('focus-tasks', JSON.stringify(tasks)); }

function getTabForTask(task) {
  if (task.done) return 'done';
  return task.bucket === 'later' ? 'later' : 'now';
}

function getDateGroup(isoStr) {
  if (!isoStr) return 'This Month';
  const d = new Date(isoStr); d.setHours(0, 0, 0, 0);
  const now = new Date(); now.setHours(0, 0, 0, 0);
  const diff = Math.round((now - d) / 86400000);
  if (diff <= 0) return 'Today';
  if (diff === 1) return 'Yesterday';
  if (diff <= 7) return 'This Week';
  return 'This Month';
}

function formatDate(iso) {
  const [, m, d] = iso.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[parseInt(m, 10) - 1]} ${parseInt(d, 10)}`;
}

function getGroupLabel(id) {
  return (taskGroups.find(g => g.id === id) || {}).label || id;
}

function renderTabBadges() {
  const nowCount   = tasks.filter(t => !t.done && t.bucket !== 'later').length;
  const laterCount = tasks.filter(t => !t.done && t.bucket === 'later').length;
  const doneCount  = tasks.filter(t => t.done).length;
  const nb = document.getElementById('tab-badge-now');
  const lb = document.getElementById('tab-badge-later');
  const db = document.getElementById('tab-badge-done');
  if (nb) { nb.textContent = nowCount   || ''; nb.classList.toggle('visible', nowCount   > 0); }
  if (lb) { lb.textContent = laterCount || ''; lb.classList.toggle('visible', laterCount > 0); }
  if (db) { db.textContent = doneCount  || ''; db.classList.toggle('visible', doneCount  > 0); }
}

function renderGroupChips() {
  const el = document.getElementById('groupChips');
  if (!el) return;
  el.innerHTML = '';
  const all = [{ id: 'all', label: 'All' }, ...taskGroups];
  all.forEach(g => {
    const chip = document.createElement('span');
    chip.className = 'group-chip' + (g.id === activeGroup ? ' active' : '');
    chip.dataset.group = g.id;
    chip.textContent = g.label;
    if (g.id !== 'all') {
      const del = document.createElement('button');
      del.className = 'group-chip-del';
      del.title = 'Delete group';
      del.textContent = '✕';
      del.addEventListener('click', e => {
        e.stopPropagation();
        taskGroups = taskGroups.filter(x => x.id !== g.id);
        saveTaskGroups();
        if (activeGroup === g.id) activeGroup = 'all';
        renderGroupChips();
        renderDrawerGroupSelect();
        renderTasks();
      });
      chip.appendChild(del);
    }
    chip.addEventListener('click', () => {
      activeGroup = g.id;
      renderGroupChips();
      renderTasks();
    });
    el.appendChild(chip);
  });
}

function renderDrawerGroupSelect() {
  const sel = document.getElementById('tdGroupSelect');
  if (!sel) return;
  const prev = sel.value;
  sel.innerHTML = '';
  taskGroups.forEach(g => {
    const opt = document.createElement('option');
    opt.value = g.id; opt.textContent = g.label;
    sel.appendChild(opt);
  });
  if (taskGroups.some(g => g.id === prev)) sel.value = prev;
}

function renderTasks() {
  const clearRow = document.getElementById('taskClearRow');
  if (clearRow) clearRow.style.display = activeTab === 'done' ? 'flex' : 'none';
  taskList.innerHTML = '';

  let filtered = tasks.map((t, i) => ({ ...t, _i: i })).filter(t => getTabForTask(t) === activeTab);
  if (activeGroup !== 'all') filtered = filtered.filter(t => t.group === activeGroup);

  if (!filtered.length) {
    const li = document.createElement('li');
    li.style.cssText = 'padding:22px 0;text-align:center;font-size:.75rem;color:rgba(245,239,230,.22);font-style:italic;list-style:none;';
    li.textContent = activeTab === 'done' ? 'No completed tasks' : 'Nothing here yet';
    taskList.appendChild(li);
    renderTabBadges();
    return;
  }

  const DATE_GROUPS = ['Today', 'Yesterday', 'This Week', 'This Month'];
  const grouped = {};
  DATE_GROUPS.forEach(g => (grouped[g] = []));
  filtered.forEach(t => {
    const g = getDateGroup(t.createdAt);
    (grouped[g] || grouped['This Month']).push(t);
  });

  DATE_GROUPS.forEach(groupLabel => {
    const items = grouped[groupLabel];
    if (!items.length) return;
    const header = document.createElement('li');
    header.className = 'task-section-header';
    header.textContent = groupLabel;
    taskList.appendChild(header);
    items.forEach(task => {
      const li = document.createElement('li');
      li.className = 'task-item';
      const tag = task.group ? `<span class="task-group-tag">${escHtml(getGroupLabel(task.group))}</span>` : '';
      li.innerHTML = `<button class="task-check${task.done ? ' done' : ''}" data-i="${task._i}">${task.done ? '✓' : ''}</button><span class="task-text${task.done ? ' done' : ''}">${escHtml(task.text)}</span>${tag}<button class="task-edit-btn" data-i="${task._i}" title="Edit task">✎</button>`;
      taskList.appendChild(li);
    });
  });

  renderTabBadges();
}

let tasks = JSON.parse(localStorage.getItem('focus-tasks') || '[]').map(normalizeTask);

const taskInput  = document.getElementById('taskInput');
const taskAddBtn = document.getElementById('taskAddBtn');
const taskList   = document.getElementById('taskList');

function addTask() {
  const v = taskInput.value.trim();
  if (!v) return;
  const group = activeGroup !== 'all' ? activeGroup : (taskGroups[0] ? taskGroups[0].id : 'work');
  tasks.push({ text: v, done: false, bucket: activeTab === 'later' ? 'later' : 'now', group, dueDate: null, createdAt: new Date().toISOString() });
  taskInput.value = '';
  saveTasks();
  renderTasks();
}

taskAddBtn.addEventListener('click', addTask);
taskInput.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

taskList.addEventListener('click', e => {
  const checkBtn = e.target.closest('.task-check');
  const editBtn  = e.target.closest('.task-edit-btn');
  if (checkBtn) {
    const i = parseInt(checkBtn.dataset.i);
    if (!isNaN(i)) { tasks[i].done = !tasks[i].done; saveTasks(); renderTasks(); }
  } else if (editBtn) {
    const i = parseInt(editBtn.dataset.i);
    if (!isNaN(i)) openDrawer(i);
  }
});

document.getElementById('taskTabs').addEventListener('click', e => {
  const btn = e.target.closest('.task-tab');
  if (!btn) return;
  activeTab = btn.dataset.tab;
  document.querySelectorAll('.task-tab').forEach(t => t.classList.toggle('active', t === btn));
  renderTasks();
});

document.getElementById('clearDoneBtn').addEventListener('click', () => {
  tasks = tasks.filter(t => !t.done);
  saveTasks();
  renderTasks();
});

// ── Sidebar view switcher ──────────────────────
document.getElementById('sidebarTabs').addEventListener('click', e => {
  const btn = e.target.closest('.sidebar-tab');
  if (!btn) return;
  sidebarView = btn.dataset.view;
  document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.toggle('active', t === btn));
  document.getElementById('tasksView').style.display  = sidebarView === 'tasks'  ? '' : 'none';
  document.getElementById('groupsView').style.display = sidebarView === 'groups' ? '' : 'none';
  renderTasks();
});

// ── Group management ───────────────────────────
document.getElementById('groupAddBtn').addEventListener('click', addGroup);
document.getElementById('groupAddInput').addEventListener('keydown', e => { if (e.key === 'Enter') addGroup(); });

function addGroup() {
  const raw = document.getElementById('groupAddInput').value.trim();
  if (!raw) return;
  const id = raw.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  if (!id || taskGroups.some(g => g.id === id)) return;
  taskGroups.push({ id, label: raw });
  saveTaskGroups();
  document.getElementById('groupAddInput').value = '';
  renderGroupChips();
  renderDrawerGroupSelect();
}

// ── Task Drawer ────────────────────────────────
let drawerTaskIndex = -1;

const taskDrawer         = document.getElementById('taskDrawer');
const taskDrawerBackdrop = document.getElementById('taskDrawerBackdrop');

function openDrawer(i) {
  drawerTaskIndex = i;
  const task = tasks[i];
  renderDrawerGroupSelect();
  document.getElementById('tdTaskName').value     = task.text;
  document.getElementById('tdDateInput').value    = task.dueDate || '';
  document.getElementById('tdDateText').value     = task.dueDate ? formatDate(task.dueDate) : '';
  document.getElementById('tdBucketSelect').value = task.bucket || 'now';
  document.getElementById('tdGroupSelect').value  = task.group  || (taskGroups[0] ? taskGroups[0].id : 'work');
  taskDrawer.classList.add('open');
  taskDrawerBackdrop.classList.add('visible');
}

function closeDrawer() {
  taskDrawer.classList.remove('open');
  taskDrawerBackdrop.classList.remove('visible');
  drawerTaskIndex = -1;
}

document.getElementById('tdClose').addEventListener('click', closeDrawer);
taskDrawerBackdrop.addEventListener('click', closeDrawer);

document.getElementById('tdDateBtn').addEventListener('click', () => {
  const input = document.getElementById('tdDateInput');
  try { input.showPicker(); } catch(_) { input.click(); }
});

document.getElementById('tdDateInput').addEventListener('change', e => {
  document.getElementById('tdDateText').value = e.target.value ? formatDate(e.target.value) : '';
});

document.getElementById('tdSaveBtn').addEventListener('click', () => {
  if (drawerTaskIndex < 0) return;
  const name = document.getElementById('tdTaskName').value.trim();
  if (name) tasks[drawerTaskIndex].text = name;
  tasks[drawerTaskIndex].dueDate = document.getElementById('tdDateInput').value || null;
  tasks[drawerTaskIndex].bucket  = document.getElementById('tdBucketSelect').value;
  tasks[drawerTaskIndex].group   = document.getElementById('tdGroupSelect').value;
  saveTasks();
  renderTasks();
  closeDrawer();
});

document.getElementById('tdDeleteBtn').addEventListener('click', () => {
  if (drawerTaskIndex < 0) return;
  tasks.splice(drawerTaskIndex, 1);
  saveTasks();
  renderTasks();
  closeDrawer();
});

// ═══════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════
buildModal();
buildVibePanel();
applyTheme(false);   // apply saved theme without animation on load
renderPresets();
renderGroupChips();
renderDrawerGroupSelect();
renderTasks();
</script>
</body>
</html>

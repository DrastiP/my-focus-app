<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focus — Pomodoro Timer</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Nunito+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream: #f5efe6;
  --amber: #d4a876;
  --sage:  #8aab7e;
  --glass: rgba(255, 248, 240, 0.07);
  --border: rgba(255, 248, 240, 0.13);
  --shadow: 0 12px 56px rgba(0,0,0,0.45);
}

html, body { height: 100%; font-family: 'Nunito Sans', sans-serif; color: var(--cream); overflow: hidden; }

#bg {
  position: fixed; inset: 0; z-index: -2;
  background-image: url('https://images.unsplash.com/photo-1448375240586-882707db888b?w=1920&q=80');
  background-size: cover; background-position: center 40%;
  filter: brightness(0.62) saturate(0.85); transform: scale(1.04);
  transition: filter 1.8s ease;
}
#overlay {
  position: fixed; inset: 0; z-index: -1;
  background: linear-gradient(160deg, rgba(6,5,3,0.52) 0%, rgba(18,12,6,0.28) 60%, rgba(4,10,8,0.48) 100%);
  transition: background 1.8s ease;
}

body.mode-work  { --primary-accent: #d4a876; --primary-text: #f5efe6; }
body.mode-break { --primary-accent: #8aab7e; --primary-text: #e8f3e8; }
body.mode-break #bg    { filter: brightness(0.55) saturate(1.1) hue-rotate(45deg); }
body.mode-break #overlay { background: linear-gradient(160deg,rgba(20,30,15,.48) 0%,rgba(30,45,20,.32) 60%,rgba(15,25,18,.52) 100%); }

/* ── Layout ───────────────────────────────────── */
.app {
  height: 100vh;
  display: grid;
  grid-template-columns: 1fr 310px;
  grid-template-rows: auto 1fr;
  gap: 18px;
  padding: 28px 32px;
  max-width: 1140px;
  margin: 0 auto;
}

/* ── Header ───────────────────────────────────── */
.header {
  grid-column: 1 / -1;
  display: flex; align-items: center; justify-content: space-between;
}
.logo {
  font-family: 'Cormorant Garamond', serif; font-style: italic;
  font-weight: 300; font-size: 1.45rem; letter-spacing: .14em;
  color: var(--primary-accent); opacity: .88; transition: color 1.2s ease;
}
.header-right { display: flex; align-items: center; gap: 10px; }

.sounds-btn {
  background: rgba(0,0,0,.25); border: 1px solid var(--border);
  color: var(--cream); font-family: 'Nunito Sans', sans-serif;
  font-size: .7rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase;
  padding: 7px 16px; border-radius: 50px; cursor: pointer;
  backdrop-filter: blur(16px); display: flex; align-items: center; gap: 6px;
  transition: background .2s ease;
}
.sounds-btn:hover { background: rgba(0,0,0,.4); }
.sounds-badge {
  background: var(--amber); color: #16100a;
  border-radius: 10px; padding: 1px 7px;
  font-size: .65rem; display: none;
}
.sounds-badge.visible { display: inline-block; }

.mode-toggle {
  display: flex; gap: 3px;
  background: rgba(0,0,0,.25); border: 1px solid var(--border);
  border-radius: 50px; padding: 4px; backdrop-filter: blur(16px);
}
.mode-btn {
  background: transparent; border: none; color: var(--cream);
  font-family: 'Nunito Sans', sans-serif; font-size: .7rem; font-weight: 600;
  letter-spacing: .1em; text-transform: uppercase; padding: 6px 16px;
  border-radius: 50px; cursor: pointer; opacity: .45;
  transition: all .3s ease; white-space: nowrap;
}
.mode-btn.active       { background: #d4a876; color: #1a1008; opacity: 1; }
.mode-btn.break-active { background: #8aab7e; color: #0d1a0d; opacity: 1; }

/* ── Timer Card ───────────────────────────────── */
.timer-card {
  background: var(--glass); border: 1px solid var(--border); border-radius: 28px;
  backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 30px; padding: 48px 40px;
  box-shadow: var(--shadow); position: relative; overflow: hidden;
}
.timer-card::before {
  content: ''; position: absolute; inset: -1px; border-radius: 28px;
  background: radial-gradient(ellipse 60% 40% at 50% 0%,rgba(212,168,118,.07),transparent 70%);
  pointer-events: none; transition: background 1.8s ease;
}
body.mode-break .timer-card::before { background: radial-gradient(ellipse 60% 40% at 50% 0%,rgba(138,171,126,.12),transparent 70%); }

.ring-wrap { position: relative; display: flex; align-items: center; justify-content: center; }
.timer-ring { transform: rotate(-90deg); }
.ring-bg    { fill: none; stroke: rgba(255,248,240,.07); stroke-width: 2.5; }
.ring-track { fill: none; stroke: rgba(255,248,240,.04); stroke-width: 2.5; stroke-dasharray: 6 6; }
.ring-progress {
  fill: none; stroke: var(--primary-accent); stroke-width: 2.5; stroke-linecap: round;
  stroke-dasharray: 678.6; stroke-dashoffset: 0;
  transition: stroke-dashoffset 1s linear, stroke .6s ease;
  filter: drop-shadow(0 0 10px rgba(212,168,118,.55));
}
.ring-progress.is-break { stroke: #8aab7e; filter: drop-shadow(0 0 10px rgba(138,171,126,.55)); }
.timer-center { position: absolute; text-align: center; user-select: none; }
.time-display {
  font-family: 'Cormorant Garamond', serif; font-size: 5rem;
  font-weight: 300; letter-spacing: -.03em; line-height: 1;
  color: var(--primary-text); transition: color 1.2s ease;
}
.mode-label {
  margin-top: 8px; font-size: .62rem; font-weight: 600;
  letter-spacing: .22em; text-transform: uppercase;
  color: var(--primary-accent); opacity: .65; transition: color 1.2s ease;
}
.mode-label.is-break { color: #8aab7e; }

.controls { display: flex; align-items: center; gap: 18px; }
.btn-icon {
  background: transparent; border: 1px solid var(--border); color: var(--cream);
  width: 42px; height: 42px; border-radius: 50%; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  opacity: .55; transition: all .2s ease; font-size: 1rem;
}
.btn-icon:hover { opacity: 1; border-color: rgba(255,248,240,.4); }
.btn-play {
  background: var(--primary-accent); border: none; color: #16100a;
  width: 64px; height: 64px; border-radius: 50%; cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 1.35rem;
  box-shadow: 0 4px 24px rgba(212,168,118,.38); transition: all .22s ease, background 1.2s ease;
}
.btn-play:hover { transform: scale(1.08); box-shadow: 0 8px 32px rgba(212,168,118,.52); }
.btn-play.is-break { background: #8aab7e; box-shadow: 0 4px 24px rgba(138,171,126,.38); }
.btn-play.is-break:hover { box-shadow: 0 8px 32px rgba(138,171,126,.52); }

.pips { display: flex; align-items: center; gap: 10px; }
.pip { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,248,240,.12); transition: background .4s ease, transform .3s ease; }
.pip.done { background: var(--primary-accent); }
.pip.done.bounce { animation: pipBounce .35s ease; }
@keyframes pipBounce { 0%{transform:scale(1)} 50%{transform:scale(1.5)} 100%{transform:scale(1)} }

/* ── Sidebar ──────────────────────────────────── */
.sidebar { display: flex; flex-direction: column; gap: 14px; min-height: 0; }
.panel {
  background: var(--glass); border: 1px solid var(--border); border-radius: 22px;
  backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
  padding: 24px 22px; box-shadow: var(--shadow);
}
.panel-label {
  font-size: .62rem; font-weight: 600; letter-spacing: .22em;
  text-transform: uppercase; color: var(--cream); opacity: .35; margin-bottom: 18px;
}
.tasks-panel { flex: 1; display: flex; flex-direction: column; min-height: 0; }
.task-input-row { display: flex; gap: 8px; margin-bottom: 14px; }
.task-field {
  flex: 1; background: rgba(255,248,240,.06); border: 1px solid var(--border);
  border-radius: 10px; color: var(--cream); font-family: 'Nunito Sans', sans-serif;
  font-size: .8rem; padding: 8px 14px; outline: none; transition: border-color .2s ease; min-width: 0;
}
.task-field::placeholder { color: rgba(245,239,230,.25); }
.task-field:focus { border-color: rgba(212,168,118,.45); }
.task-add {
  background: var(--amber); border: none; color: #16100a;
  width: 34px; height: 34px; flex-shrink: 0; border-radius: 10px;
  cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center;
  transition: opacity .2s, transform .15s;
}
.task-add:hover { opacity: .82; transform: scale(1.06); }
.task-list {
  list-style: none; overflow-y: auto; flex: 1;
  display: flex; flex-direction: column; gap: 5px; padding-right: 2px;
}
.task-list::-webkit-scrollbar { width: 3px; }
.task-list::-webkit-scrollbar-track { background: transparent; }
.task-list::-webkit-scrollbar-thumb { background: rgba(255,248,240,.12); border-radius: 2px; }
.task-item {
  display: flex; align-items: center; gap: 10px; padding: 9px 12px;
  background: rgba(255,248,240,.04); border-radius: 10px;
  animation: fadeUp .22s ease; transition: background .15s;
}
.task-item:hover { background: rgba(255,248,240,.07); }
@keyframes fadeUp { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
.task-check {
  width: 18px; height: 18px; border-radius: 50%;
  border: 1.5px solid rgba(255,248,240,.22); background: transparent;
  cursor: pointer; flex-shrink: 0; display: flex; align-items: center;
  justify-content: center; font-size: .62rem; transition: all .2s ease; color: #fff;
}
.task-check.done { background: var(--sage); border-color: var(--sage); }
.task-text { flex: 1; font-size: .8rem; font-weight: 300; line-height: 1.4; transition: all .22s ease; word-break: break-word; }
.task-text.done { text-decoration: line-through; opacity: .3; }
.task-del {
  background: transparent; border: none; color: var(--cream);
  opacity: 0; cursor: pointer; font-size: .72rem;
  padding: 2px 4px; border-radius: 4px; transition: opacity .15s; flex-shrink: 0;
}
.task-item:hover .task-del { opacity: .35; }
.task-del:hover { opacity: 1 !important; }

/* ── global range base (dark mode) ───────────── */
input[type=range] {
  -webkit-appearance: none; appearance: none;
  height: 3px; background: rgba(255,248,240,.14);
  border-radius: 2px; outline: none; cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 14px; height: 14px;
  border-radius: 50%; background: var(--amber); cursor: pointer;
  box-shadow: 0 0 8px rgba(212,168,118,.45);
}
input[type=range]::-moz-range-thumb { width:14px;height:14px;border:none;border-radius:50%;background:var(--amber); }

/* ════════════════════════════════════════════════
   SOUND MODAL  (light mode)
   ════════════════════════════════════════════════ */
.sound-modal {
  position: fixed; inset: 0; z-index: 1000;
  display: flex; align-items: center; justify-content: center;
}
.sound-modal.hidden { display: none; }
.sm-backdrop {
  position: absolute; inset: 0;
  background: rgba(0,0,0,.55); backdrop-filter: blur(6px);
}
.sm-dialog {
  position: relative; z-index: 1;
  width: min(980px, 96vw); max-height: 88vh;
  background: #f7f5f2; border-radius: 24px;
  overflow: hidden; display: flex; flex-direction: column;
  box-shadow: 0 32px 96px rgba(0,0,0,.5);
}

/* ── Modal Header ─────────────────────────────── */
.sm-header {
  display: flex; align-items: center; gap: 16px;
  padding: 18px 24px 16px;
  border-bottom: 1px solid #e8e0d6; background: #fff; flex-shrink: 0;
}
.sm-title {
  font-family: 'Cormorant Garamond', serif; font-style: italic;
  font-size: 1.25rem; font-weight: 300; color: #2d2419; flex: 1;
}
.sm-master-row {
  display: flex; align-items: center; gap: 8px;
}
.sm-master-row span { font-size: .8rem; color: #8a7a6a; }
.sm-master-vol { width: 110px; }
.sm-close {
  background: none; border: none; cursor: pointer;
  color: #8a7a6a; font-size: 1rem; padding: 6px 8px;
  border-radius: 8px; transition: background .15s, color .15s; line-height: 1;
}
.sm-close:hover { background: #f0ebe3; color: #2d2419; }

/* ── Modal Body ───────────────────────────────── */
.sm-body {
  display: grid;
  grid-template-columns: 168px 1fr 240px;
  flex: 1; min-height: 0; overflow: hidden;
}

/* ── Tabs ─────────────────────────────────────── */
.sm-tabs {
  border-right: 1px solid #e8e0d6;
  overflow-y: auto; padding: 10px 8px;
  background: #faf8f5; display: flex; flex-direction: column; gap: 2px;
}
.sm-tabs::-webkit-scrollbar { width: 3px; }
.sm-tabs::-webkit-scrollbar-thumb { background: #d8d0c8; border-radius: 2px; }
.sm-tab {
  display: block; width: 100%; padding: 9px 14px;
  border: none; background: transparent; text-align: left; cursor: pointer;
  border-radius: 8px; font-family: 'Nunito Sans', sans-serif;
  font-size: .8rem; font-weight: 600; color: #6b5a4a;
  transition: background .15s, color .15s;
}
.sm-tab:hover { background: #ede5da; }
.sm-tab.active { background: #fdf0df; color: #8b5e1a; }

/* ── Sound Grid ───────────────────────────────── */
.sm-grid {
  padding: 16px; overflow-y: auto; background: #f7f5f2;
}
.sm-grid::-webkit-scrollbar { width: 4px; }
.sm-grid::-webkit-scrollbar-thumb { background: #d8d0c8; border-radius: 2px; }
.sm-panel { display: none; }
.sm-panel.active {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px; align-content: start;
}

/* ── Sound Card ───────────────────────────────── */
.sound-card {
  background: #fff; border: 1.5px solid #e8e0d6; border-radius: 14px;
  padding: 13px 12px 11px; cursor: pointer;
  transition: border-color .18s, box-shadow .18s, background .18s;
  user-select: none;
}
.sound-card:hover { border-color: #d4a876; box-shadow: 0 2px 14px rgba(212,168,118,.15); }
.sound-card.active { background: #fff8ee; border-color: #d4a876; box-shadow: 0 2px 18px rgba(212,168,118,.22); }
.sc-top { display: flex; align-items: center; gap: 7px; margin-bottom: 9px; }
.sc-icon { font-size: 1.3rem; line-height: 1; flex-shrink: 0; }
.sc-name { font-size: .74rem; font-weight: 600; color: #2d2419; flex: 1; line-height: 1.25; }
.sc-toggle {
  width: 30px; height: 17px; border-radius: 9px;
  background: #d0c8be; border: none; cursor: pointer;
  position: relative; flex-shrink: 0; transition: background .2s;
}
.sc-toggle::after {
  content: ''; position: absolute;
  width: 13px; height: 13px; background: #fff; border-radius: 50%;
  top: 2px; left: 2px; transition: transform .2s; box-shadow: 0 1px 3px rgba(0,0,0,.2);
}
.sound-card.active .sc-toggle { background: #d4a876; }
.sound-card.active .sc-toggle::after { transform: translateX(13px); }

.sc-vol {
  width: 100%; height: 3px; -webkit-appearance: none; appearance: none;
  background: #e8e0d6; border-radius: 2px; cursor: pointer; outline: none;
  opacity: 0; transition: opacity .2s; pointer-events: none;
}
.sound-card.active .sc-vol { opacity: 1; pointer-events: auto; }
.sc-vol::-webkit-slider-thumb {
  -webkit-appearance: none; width: 13px; height: 13px;
  border-radius: 50%; background: #d4a876; cursor: pointer;
  box-shadow: 0 0 5px rgba(212,168,118,.4);
}
.sc-vol::-moz-range-thumb { width:13px;height:13px;border:none;border-radius:50%;background:#d4a876; }

/* ── Mix Panel ────────────────────────────────── */
.sm-mix {
  border-left: 1px solid #e8e0d6;
  display: flex; flex-direction: column; gap: 0;
  background: #faf8f5; overflow: hidden;
}
.sm-mix-section {
  padding: 14px 16px;
  border-bottom: 1px solid #e8e0d6;
}
.sm-mix-section:last-child { border-bottom: none; flex: 1; overflow-y: auto; }
.sm-mix-section::-webkit-scrollbar { width: 3px; }
.sm-mix-section::-webkit-scrollbar-thumb { background: #d8d0c8; border-radius: 2px; }
.sm-section-label {
  font-size: .6rem; font-weight: 600; letter-spacing: .2em;
  text-transform: uppercase; color: #9a8878; margin-bottom: 10px;
}

/* master vol in mix */
.mix-master-row { display: flex; align-items: center; gap: 8px; }
.mix-master-row span { font-size: .8rem; color: #6b5a4a; }
.mix-master-range {
  flex: 1; height: 3px; -webkit-appearance: none; appearance: none;
  background: #e8e0d6; border-radius: 2px; cursor: pointer; outline: none;
}
.mix-master-range::-webkit-slider-thumb {
  -webkit-appearance: none; width: 13px; height: 13px;
  border-radius: 50%; background: #d4a876; cursor: pointer;
}
.mix-master-range::-moz-range-thumb { width:13px;height:13px;border:none;border-radius:50%;background:#d4a876; }

/* active sound items */
.mix-list { display: flex; flex-direction: column; gap: 7px; }
.mix-empty {
  font-size: .78rem; color: #b0a090; font-style: italic;
  text-align: center; padding: 12px 0;
}
.asi {
  background: #fff; border: 1px solid #e8e0d6; border-radius: 10px;
  padding: 9px 10px; display: flex; flex-direction: column; gap: 6px;
}
.asi-top { display: flex; align-items: center; gap: 6px; }
.asi-icon { font-size: 1rem; flex-shrink: 0; }
.asi-name { font-size: .76rem; font-weight: 600; color: #2d2419; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.asi-remove {
  background: none; border: none; cursor: pointer;
  color: #b0a090; font-size: .75rem; padding: 2px 4px;
  border-radius: 4px; flex-shrink: 0; transition: color .15s;
  line-height: 1;
}
.asi-remove:hover { color: #e05555; }
.asi-vol {
  width: 100%; height: 3px; -webkit-appearance: none; appearance: none;
  background: #e8e0d6; border-radius: 2px; cursor: pointer; outline: none;
}
.asi-vol::-webkit-slider-thumb {
  -webkit-appearance: none; width: 12px; height: 12px;
  border-radius: 50%; background: #d4a876; cursor: pointer;
}
.asi-vol::-moz-range-thumb { width:12px;height:12px;border:none;border-radius:50%;background:#d4a876; }

/* presets */
.preset-list { display: flex; flex-direction: column; gap: 5px; }
.preset-row { display: flex; align-items: center; gap: 5px; }
.preset-load-btn {
  flex: 1; padding: 7px 10px; background: #fff; border: 1px solid #e8e0d6;
  border-radius: 8px; cursor: pointer; font-size: .76rem; color: #2d2419;
  text-align: left; transition: background .15s, border-color .15s;
  font-family: 'Nunito Sans', sans-serif; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.preset-load-btn:hover { background: #fff8ee; border-color: #d4a876; }
.preset-del-btn {
  background: none; border: none; cursor: pointer;
  color: #b0a090; font-size: .75rem; padding: 5px; border-radius: 4px;
  flex-shrink: 0; transition: color .15s;
}
.preset-del-btn:hover { color: #e05555; }
.preset-save-row { display: flex; gap: 6px; margin-top: 8px; }
.preset-name-input {
  flex: 1; padding: 7px 10px; border: 1px solid #e8e0d6; border-radius: 8px;
  font-family: 'Nunito Sans', sans-serif; font-size: .76rem; color: #2d2419;
  background: #fff; outline: none; transition: border-color .15s;
  min-width: 0;
}
.preset-name-input::placeholder { color: #b0a090; }
.preset-name-input:focus { border-color: #d4a876; }
.preset-save-btn {
  background: #d4a876; border: none; border-radius: 8px;
  color: #fff; padding: 7px 11px; font-size: .74rem;
  cursor: pointer; font-family: 'Nunito Sans', sans-serif; font-weight: 600;
  transition: opacity .15s; flex-shrink: 0;
}
.preset-save-btn:hover { opacity: .85; }

/* ── Responsive ───────────────────────────────── */
@media (max-width: 720px) {
  html, body { overflow-y: auto; }
  .app { grid-template-columns: 1fr; height: auto; padding: 20px; gap: 14px; }
  .time-display { font-size: 4rem; }
  .sidebar { grid-row: 3; }
  .sm-body { grid-template-columns: 1fr; }
  .sm-tabs { flex-direction: row; flex-wrap: wrap; border-right: none; border-bottom: 1px solid #e8e0d6; overflow-x: auto; }
  .sm-mix { border-left: none; border-top: 1px solid #e8e0d6; }
  .sm-panel.active { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<div id="bg"></div>
<div id="overlay"></div>

<!-- ── Sound Modal ──────────────────────────────────────────── -->
<div id="soundModal" class="sound-modal hidden">
  <div class="sm-backdrop" id="smBackdrop"></div>
  <div class="sm-dialog">
    <!-- Header -->
    <div class="sm-header">
      <span class="sm-title">Sounds</span>
      <div class="sm-master-row">
        <span>🔈</span>
        <input type="range" id="masterVolSlider" class="sm-master-vol" min="0" max="1" step="0.01" value="0.7">
        <span>🔊</span>
      </div>
      <button class="sm-close" id="smClose">✕</button>
    </div>
    <!-- Body -->
    <div class="sm-body">
      <!-- Tabs -->
      <nav class="sm-tabs" id="smTabs"></nav>
      <!-- Grid -->
      <div class="sm-grid" id="smGrid"></div>
      <!-- Mix Panel -->
      <aside class="sm-mix">
        <div class="sm-mix-section">
          <div class="sm-section-label">Now Playing</div>
          <div class="mix-list" id="mixList">
            <p class="mix-empty">No sounds active</p>
          </div>
        </div>
        <div class="sm-mix-section">
          <div class="sm-section-label">Presets</div>

<script>
'use strict';
// ═══════════════════════════════════════════════════════════════
//  TIMER ENGINE  (unchanged logic)
// ═══════════════════════════════════════════════════════════════
const CIRC = 2 * Math.PI * 108;
const MODES = {
  work:  { label: 'Focus Time',  secs: 25*60, break: false },
  short: { label: 'Short Break', secs:  5*60, break: true  },
  long:  { label: 'Long Break',  secs: 15*60, break: true  },
};
let mode = 'work', total = MODES.work.secs, remaining = total;
let running = false, ticker = null, sessions = 0;

const timeEl   = document.getElementById('timeDisplay');
const labelEl  = document.getElementById('modeLabel');
const ringEl   = document.getElementById('ring');
const playBtn  = document.getElementById('playBtn');
const resetBtn = document.getElementById('resetBtn');
const skipBtn  = document.getElementById('skipBtn');
const pipsEl   = document.getElementById('pips');

const fmt = s => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;

function refreshRing() { ringEl.style.strokeDashoffset = CIRC * (1 - remaining/total); }

function applyMode(m) {
  mode = m; total = remaining = MODES[m].secs;
  running = false; clearInterval(ticker);
  playBtn.textContent = '▶';
  timeEl.textContent = fmt(remaining);
  labelEl.textContent = MODES[m].label;
  ringEl.style.strokeDashoffset = 0;
  const isBreak = MODES[m].break;
  ringEl.classList.toggle('is-break', isBreak);
  playBtn.classList.toggle('is-break', isBreak);
  labelEl.classList.toggle('is-break', isBreak);
  document.body.classList.toggle('mode-work',  !isBreak);
  document.body.classList.toggle('mode-break',  isBreak);
  document.querySelectorAll('.mode-btn').forEach(b => {
    b.classList.remove('active','break-active');
    if (b.dataset.mode === m) b.classList.add(isBreak ? 'break-active' : 'active');
  });
}

function tick() {
  remaining = Math.max(0, remaining - 1);
  timeEl.textContent = fmt(remaining); refreshRing();
  if (remaining === 0) {
    clearInterval(ticker); running = false; playBtn.textContent = '▶';
    chime();
    if (!MODES[mode].break) { sessions = Math.min(sessions+1, 4); refreshPips(true); }
    setTimeout(() => applyMode(MODES[mode].break ? 'work' : 'short'), 1000);
  }
}

function togglePlay() {
  if (running) { clearInterval(ticker); running = false; playBtn.textContent = '▶'; }
  else { ticker = setInterval(tick, 1000); running = true; playBtn.textContent = '⏸'; }
}

function refreshPips(bounce = false) {
  pipsEl.querySelectorAll('.pip').forEach((p, i) => {
    const done = i < sessions; p.classList.toggle('done', done);
    if (done && bounce && i === sessions-1) { p.classList.remove('bounce'); void p.offsetWidth; p.classList.add('bounce'); }
  });
}

function chime() {
  try {
    const ctx = getCtx();
    [523.25, 659.25, 783.99].forEach((f, i) => {
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.type = 'sine'; osc.frequency.value = f;
      g.gain.setValueAtTime(0, ctx.currentTime + i*.18);
      g.gain.linearRampToValueAtTime(0.12, ctx.currentTime + i*.18 + .05);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*.18 + .7);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(ctx.currentTime + i*.18); osc.stop(ctx.currentTime + i*.18 + .8);
    });
  } catch(e) {}
}

playBtn.addEventListener('click', togglePlay);
resetBtn.addEventListener('click', () => applyMode(mode));
skipBtn.addEventListener('click', () => {
  clearInterval(ticker); running = false;
  if (!MODES[mode].break) { sessions = Math.min(sessions+1,4); refreshPips(true); }
  applyMode(MODES[mode].break ? 'work' : 'short');
});
document.querySelectorAll('.mode-btn').forEach(b => b.addEventListener('click', () => applyMode(b.dataset.mode)));
applyMode('work');

// ═══════════════════════════════════════════════════════════════
//  MULTI-SOUND AUDIO ENGINE
// ═══════════════════════════════════════════════════════════════
let audioCtx   = null;
let masterGain = null;
const activeSounds = new Map(); // id → { stopFn, gainNode, vol }

function getCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = parseFloat(document.getElementById('masterVolSlider').value);
    masterGain.connect(audioCtx.destination);
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

// ── Helpers ────────────────────────────────────────────────────
const R = Math.random;

function tryStop(src) { try { src.stop(); } catch(e) {} }

function bq(c, type, freq, q = 0.7) {
  const f = c.createBiquadFilter();
  f.type = type; f.frequency.value = freq; f.Q.value = q;
  return f;
}

function makeBuf(ctx, type) {
  const len = ctx.sampleRate * 4;
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const d   = buf.getChannelData(0);
  if (type === 'white') {
    for (let i = 0; i < len; i++) d[i] = R()*2 - 1;
  } else if (type === 'pink') {
    let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
    for (let i = 0; i < len; i++) {
      const w = R()*2 - 1;
      b0=0.99886*b0+w*0.0555179; b1=0.99332*b1+w*0.0750759;
      b2=0.969*b2+w*0.153852;   b3=0.8665*b3+w*0.3104856;
      b4=0.55*b4+w*0.5329522;   b5=-0.7616*b5-w*0.016898;
      d[i] = (b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.11; b6=w*0.115926;
    }
  } else { // brown
    let last = 0;
    for (let i = 0; i < len; i++) {
      const w = R()*2 - 1; d[i] = (last + 0.02*w)/1.02; last = d[i]; d[i] *= 3.5;
    }
  }
  return buf;
}

function ns(c, type) {
  const s = c.createBufferSource(); s.buffer = makeBuf(c, type); s.loop = true; return s;
}

// One-shot oscillator impulse (for drips, clicks, etc.)
function pulse(c, out, type, freq, vol, dur) {
  const o = c.createOscillator(), g = c.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, c.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
  o.connect(g); g.connect(out);
  o.start(); o.stop(c.currentTime + dur + 0.01);
}

// Add / remove / volume control
function addSound(id, vol = 0.5) {
  if (activeSounds.has(id)) return;
  const ctx      = getCtx();
  const gainNode = ctx.createGain();
  gainNode.gain.setValueAtTime(0, ctx.currentTime);
  gainNode.connect(masterGain);
  gainNode.gain.setTargetAtTime(vol, ctx.currentTime, 0.4);
  const stopFn = GENERATORS[id](ctx, gainNode);
  activeSounds.set(id, { stopFn, gainNode, vol });
  updateSoundUI();
}

function removeSound(id) {
  if (!activeSounds.has(id)) return;
  const { stopFn, gainNode } = activeSounds.get(id);
  gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.3);
  setTimeout(() => { stopFn(); try { gainNode.disconnect(); } catch(e){} }, 1000);
  activeSounds.delete(id);
  updateSoundUI();
}

function setSoundVol(id, vol) {
  if (!activeSounds.has(id)) return;
  const entry = activeSounds.get(id);
  entry.gainNode.gain.setTargetAtTime(vol, audioCtx.currentTime, 0.08);
  entry.vol = vol;
}

function toggleSound(id, vol) {
  if (activeSounds.has(id)) removeSound(id);
  else addSound(id, vol !== undefined ? vol : 0.5);
}

// ── Sound Generators ───────────────────────────────────────────
const GENERATORS = {};

// Helper: noise drain through filters into output
function rainBase(c, out, noiseType, hpFreq, lpFreq) {
  const s = ns(c, noiseType), h = bq(c,'highpass',hpFreq), l = bq(c,'lowpass',lpFreq,.4);
  s.connect(h); h.connect(l); l.connect(out); s.start(); return s;
}

// ─── RAIN ──────────────────────────────────────────────────────
GENERATORS['light-rain'] = (c, o) => {
  const s = rainBase(c, o, 'white', 300, 1400);
  let on = true;
  const drip = () => { if (!on) return; pulse(c, o, 'sine', 700+R()*500, .055, .14); setTimeout(drip, 900+R()*1500); };
  drip(); return () => { on=false; tryStop(s); };
};

GENERATORS['heavy-rain'] = (c, o) => {
  const s = rainBase(c, o, 'pink', 400, 2000);
  let on = true;
  const drip = () => { if (!on) return; pulse(c, o, 'sine', 650+R()*600, .068, .17); setTimeout(drip, 100+R()*360); };
  drip(); return () => { on=false; tryStop(s); };
};

GENERATORS['rain-window'] = (c, o) => {
  const s = rainBase(c, o, 'white', 600, 3000);
  let on = true;
  const tap = () => {
    if (!on) return;
    const f = 900+R()*1100, oo=c.createOscillator(), g=c.createGain();
    oo.type='triangle'; oo.frequency.setValueAtTime(f,c.currentTime); oo.frequency.exponentialRampToValueAtTime(f*.8,c.currentTime+.12);
    g.gain.setValueAtTime(.08,c.currentTime); g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.18);
    oo.connect(g); g.connect(o); oo.start(); oo.stop(c.currentTime+.2);
    setTimeout(tap, 350+R()*1000);
  };
  tap(); return () => { on=false; tryStop(s); };
};

GENERATORS['rain-roof'] = (c, o) => {
  const s = rainBase(c, o, 'white', 500, 2200);
  let on = true;
  const drop = () => {
    if (!on) return;
    const f=1200+R()*800, oo=c.createOscillator(), g=c.createGain();
    oo.type='triangle'; oo.frequency.setValueAtTime(f,c.currentTime); oo.frequency.exponentialRampToValueAtTime(f*.85,c.currentTime+.15);
    g.gain.setValueAtTime(.08,c.currentTime); g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.2);
    oo.connect(g); g.connect(o); oo.start(); oo.stop(c.currentTime+.22);
    setTimeout(drop, 160+R()*600);
  };
  drop(); return () => { on=false; tryStop(s); };
};

GENERATORS['rain-thunder'] = (c, o) => {
  const s = rainBase(c, o, 'pink', 300, 1800);
  let on = true;
  const drip = () => { if (!on) return; pulse(c, o, 'sine', 700+R()*500, .055, .15); setTimeout(drip, 140+R()*500); };
  drip();
  const thunder = () => {
    if (!on) return;
    const delay = 2000+R()*4000;
    setTimeout(() => {
      if (!on) return;
      const ro=c.createOscillator(), rg=c.createGain();
      ro.type='sine'; ro.frequency.value=38+R()*55;
      rg.gain.setValueAtTime(0,c.currentTime); rg.gain.linearRampToValueAtTime(.22,c.currentTime+.12); rg.gain.exponentialRampToValueAtTime(.01,c.currentTime+1.8);
      ro.connect(rg); rg.connect(o); ro.start(); ro.stop(c.currentTime+2);
      const cs=ns(c,'white'), cf=bq(c,'highpass',3200), cg=c.createGain();
      cg.gain.setValueAtTime(0,c.currentTime); cg.gain.linearRampToValueAtTime(.28,c.currentTime+.04); cg.gain.exponentialRampToValueAtTime(.001,c.currentTime+.45);
      cs.connect(cf); cf.connect(cg); cg.connect(o); cs.start(); cs.stop(c.currentTime+.5);
    }, delay);
    setTimeout(thunder, 6000+R()*5000);
  };
  thunder(); return () => { on=false; tryStop(s); };
};

GENERATORS['distant-thunder'] = (c, o) => {
  const s = ns(c, 'pink'), l = bq(c,'lowpass',180,.5);
  s.connect(l); l.connect(o); s.start();
  let on = true;
  const boom = () => {
    if (!on) return;
    const ro=c.createOscillator(), rg=c.createGain();
    ro.type='sine'; ro.frequency.value=28+R()*35;
    rg.gain.setValueAtTime(0,c.currentTime); rg.gain.linearRampToValueAtTime(.18,c.currentTime+.4); rg.gain.exponentialRampToValueAtTime(.001,c.currentTime+3.5);
    ro.connect(rg); rg.connect(o); ro.start(); ro.stop(c.currentTime+4);
    setTimeout(boom, 8000+R()*9000);
  };
  boom(); return () => { on=false; tryStop(s); };
};

// ─── NATURE ────────────────────────────────────────────────────
GENERATORS['forest'] = (c, o) => {
  const s = ns(c,'pink'), l = bq(c,'lowpass',500);
  s.connect(l); l.connect(o); s.start();
  let on = true;
  const bird = () => {
    if (!on) return;
    const n = 2+Math.floor(R()*3);
    for (let i=0;i<n;i++) setTimeout(() => {
      if (!on) return;
      const f=1600+R()*1400, ob=c.createOscillator(), bg=c.createGain();
      ob.type='sine'; ob.frequency.setValueAtTime(f,c.currentTime); ob.frequency.linearRampToValueAtTime(f*1.25,c.currentTime+.09); ob.frequency.linearRampToValueAtTime(f,c.currentTime+.18);
      bg.gain.setValueAtTime(0,c.currentTime); bg.gain.linearRampToValueAtTime(.04,c.currentTime+.02); bg.gain.linearRampToValueAtTime(0,c.currentTime+.2);
      ob.connect(bg); bg.connect(o); ob.start(); ob.stop(c.currentTime+.22);
    }, i*160);
    setTimeout(bird, 1800+R()*3800);
  };
  bird(); return () => { on=false; tryStop(s); };
};

GENERATORS['wind'] = (c, o) => {
  const wg = c.createGain(); wg.gain.value = 0;
  const s = ns(c,'pink'), h=bq(c,'highpass',80), l=bq(c,'lowpass',600);
  s.connect(h); h.connect(l); l.connect(wg); wg.connect(o); s.start();
  // LFO for swaying
  const lfo=c.createOscillator(), lg=c.createGain();
  lfo.type='sine'; lfo.frequency.value=.1; lg.gain.value=.22;
  lfo.connect(lg); lg.connect(wg.gain); wg.gain.value=.35;
  lfo.start();
  return () => { tryStop(s); tryStop(lfo); };
};

GENERATORS['ocean'] = (c, o) => {
  const wg = c.createGain(); wg.gain.value=.1;
  const s=ns(c,'pink'), l=bq(c,'lowpass',800);
  s.connect(l); l.connect(wg); wg.connect(o); s.start();
  let on=true, ph=0;
  const wave = () => {
    if (!on) return;
    const t=c.currentTime, dur=3.5+R()*1.5;
    wg.gain.cancelScheduledValues(t);
    if (ph%2===0) { wg.gain.setValueAtTime(.08,t); wg.gain.linearRampToValueAtTime(.75,t+dur*.4); wg.gain.linearRampToValueAtTime(.1,t+dur); }
    else           { wg.gain.setValueAtTime(.1,t); wg.gain.linearRampToValueAtTime(.06,t+dur); }
    ph++; setTimeout(wave, dur*1000);
  };
  wave(); return () => { on=false; tryStop(s); };
};

GENERATORS['river'] = (c, o) => {
  const s=ns(c,'white'), h=bq(c,'highpass',280), l=bq(c,'lowpass',1600);
  s.connect(h); h.connect(l); l.connect(o); s.start();
  return () => tryStop(s);
};

GENERATORS['birds'] = (c, o) => {
  let on=true;
  const chirp = () => {
    if (!on) return;
    const n=3+Math.floor(R()*4);
    for (let i=0;i<n;i++) setTimeout(() => {
      if (!on) return;
      const f=2000+R()*2200, ob=c.createOscillator(), bg=c.createGain();
      ob.type='sine'; ob.frequency.setValueAtTime(f,c.currentTime); ob.frequency.linearRampToValueAtTime(f*(1.1+R()*.3),c.currentTime+.07); ob.frequency.linearRampToValueAtTime(f,c.currentTime+.15);
      bg.gain.setValueAtTime(0,c.currentTime); bg.gain.linearRampToValueAtTime(.055,c.currentTime+.02); bg.gain.linearRampToValueAtTime(0,c.currentTime+.17);
      ob.connect(bg); bg.connect(o); ob.start(); ob.stop(c.currentTime+.19);
    }, i*(110+R()*70));
    setTimeout(chirp, 500+R()*2000);
  };
  chirp(); return () => { on=false; };
};

// ─── ZEN ───────────────────────────────────────────────────────
GENERATORS['alpha'] = (c, o) => {
  const s=ns(c,'pink'), l=bq(c,'lowpass',380);
  s.connect(l); l.connect(o); s.start();
  const base=c.createOscillator(), bg=c.createGain();
  base.type='sine'; base.frequency.value=180; bg.gain.value=.04;
  const lfo=c.createOscillator(), lg=c.createGain();
  lfo.type='sine'; lfo.frequency.value=10; lg.gain.value=.035;
  lfo.connect(lg); lg.connect(bg.gain); base.connect(bg); bg.connect(o);
  base.start(); lfo.start();
  return () => { tryStop(s); tryStop(base); tryStop(lfo); };
};

GENERATORS['theta'] = (c, o) => {
  const s=ns(c,'pink'), l=bq(c,'lowpass',300);
  s.connect(l); l.connect(o); s.start();
  const base=c.createOscillator(), bg=c.createGain();
  base.type='sine'; base.frequency.value=160; bg.gain.value=.04;
  const lfo=c.createOscillator(), lg=c.createGain();
  lfo.type='sine'; lfo.frequency.value=6; lg.gain.value=.035;
  lfo.connect(lg); lg.connect(bg.gain); base.connect(bg); bg.connect(o);
  base.start(); lfo.start();
  return () => { tryStop(s); tryStop(base); tryStop(lfo); };
};

GENERATORS['chimes'] = (c, o) => {
  const freqs=[523.25,587.33,659.25,783.99,880,1046.5];
  let on=true;
  const chime = () => {
    if (!on) return;
    const f=freqs[Math.floor(R()*freqs.length)];
    const ob=c.createOscillator(), bg=c.createGain();
    ob.type='sine'; ob.frequency.value=f;
    bg.gain.setValueAtTime(.09,c.currentTime); bg.gain.exponentialRampToValueAtTime(.001,c.currentTime+2.8);
    ob.connect(bg); bg.connect(o); ob.start(); ob.stop(c.currentTime+3);
    const ob2=c.createOscillator(), bg2=c.createGain();
    ob2.type='sine'; ob2.frequency.value=f*2.75;
    bg2.gain.setValueAtTime(.02,c.currentTime); bg2.gain.exponentialRampToValueAtTime(.001,c.currentTime+1.2);
    ob2.connect(bg2); bg2.connect(o); ob2.start(); ob2.stop(c.currentTime+1.4);
    setTimeout(chime, 2000+R()*3500);
  };
  chime(); return () => { on=false; };
};

// ─── CITY ──────────────────────────────────────────────────────
GENERATORS['traffic'] = (c, o) => {
  const s=ns(c,'pink'), l=bq(c,'lowpass',200);
  s.connect(l); l.connect(o); s.start();
  let on=true;
  const car = () => {
    if (!on) return;
    const s2=ns(c,'pink'), b=bq(c,'bandpass',280,1.8), g=c.createGain();
    g.gain.setValueAtTime(0,c.currentTime); g.gain.linearRampToValueAtTime(.18,c.currentTime+.55); g.gain.linearRampToValueAtTime(0,c.currentTime+2.8);
    s2.connect(b); b.connect(g); g.connect(o); s2.start(); s2.stop(c.currentTime+3);
    setTimeout(car, 3000+R()*7000);
  };
  car(); return () => { on=false; tryStop(s); };
};

GENERATORS['night-city'] = (c, o) => {
  const s=ns(c,'pink'), l=bq(c,'lowpass',150);
  s.connect(l); l.connect(o); s.start();
  let on=true;
  const distant = () => {
    if (!on) return; pulse(c, o, 'sine', 80+R()*40, .05, .9); setTimeout(distant, 4000+R()*7000);
  };
  distant(); return () => { on=false; tryStop(s); };
};

GENERATORS['street'] = (c, o) => {
  const s=ns(c,'white'), h=bq(c,'highpass',200), l=bq(c,'lowpass',1100);
  s.connect(h); h.connect(l); l.connect(o); s.start();
  return () => tryStop(s);
};

GENERATORS['subway'] = (c, o) => {
  const s=ns(c,'pink'), l=bq(c,'lowpass',320);
  s.connect(l); l.connect(o); s.start();
  const d=c.createOscillator(), dg=c.createGain();
  d.type='sawtooth'; d.frequency.value=82; dg.gain.value=.038;

// ═══════════════════════════════════════════════════════════════
//  BUILD MODAL DOM
// ═══════════════════════════════════════════════════════════════
function buildModal() {
  const tabsEl = document.getElementById('smTabs');
  const gridEl = document.getElementById('smGrid');

  CATEGORIES.forEach((cat, ci) => {
    // Tab
    const tab = document.createElement('button');
    tab.className = 'sm-tab' + (ci===0?' active':'');
    tab.dataset.tab = cat.id;
    tab.textContent = cat.label;
    tabsEl.appendChild(tab);

    // Panel
    const panel = document.createElement('div');
    panel.className = 'sm-panel' + (ci===0?' active':'');
    panel.dataset.panel = cat.id;

    cat.sounds.forEach(sound => {
      const card = document.createElement('div');
      card.className = 'sound-card';
      card.dataset.sound = sound.id;
      card.innerHTML = `
        <div class="sc-top">
          <span class="sc-icon">${sound.icon}</span>
          <span class="sc-name">${sound.name}</span>
          <button class="sc-toggle" title="Toggle"></button>
        </div>
        <input type="range" class="sc-vol" min="0" max="1" step="0.01" value="0.5" data-sound="${sound.id}">
      `;

      // Click card body (not slider) → toggle
      card.addEventListener('click', e => {
        if (e.target.classList.contains('sc-vol')) return;
        const vol = parseFloat(card.querySelector('.sc-vol').value);
        toggleSound(sound.id, vol);
      });

      // Slider → adjust volume
      card.querySelector('.sc-vol').addEventListener('input', e => {
        e.stopPropagation();
        const vol = parseFloat(e.target.value);
        setSoundVol(sound.id, vol);
        // Sync mix panel slider
        const mixSlider = document.querySelector(`.asi-vol[data-sound="${sound.id}"]`);
        if (mixSlider) mixSlider.value = vol;
      });

      panel.appendChild(card);
    });
    gridEl.appendChild(panel);
  });
}

// ═══════════════════════════════════════════════════════════════
//  UI UPDATE
// ═══════════════════════════════════════════════════════════════
function updateSoundUI() {
  // Header badge
  const cnt   = activeSounds.size;
  const badge = document.getElementById('soundsBadge');
  badge.textContent = cnt || '';
  badge.classList.toggle('visible', cnt > 0);

  // Sound cards active state + slider value
  document.querySelectorAll('.sound-card').forEach(card => {
    const id = card.dataset.sound;
    const active = activeSounds.has(id);
    card.classList.toggle('active', active);
    if (active) card.querySelector('.sc-vol').value = activeSounds.get(id).vol;
  });

  // Mix panel
  renderMix();
}

function renderMix() {
  const list = document.getElementById('mixList');
  list.innerHTML = '';
  if (activeSounds.size === 0) {
    list.innerHTML = '<p class="mix-empty">No sounds active</p>'; return;
  }
  activeSounds.forEach((data, id) => {
    const info = SOUND_INFO.get(id) || { name: id, icon: '♪' };
    const item  = document.createElement('div');
    item.className = 'asi';
    item.innerHTML = `
      <div class="asi-top">
        <span class="asi-icon">${info.icon}</span>
        <span class="asi-name">${info.name}</span>
        <button class="asi-remove" data-sound="${id}" title="Remove">✕</button>
      </div>
      <input type="range" class="asi-vol" min="0" max="1" step="0.01" value="${data.vol}" data-sound="${id}">
    `;
    // Mix panel slider → adjust volume
    item.querySelector('.asi-vol').addEventListener('input', e => {
      const vol = parseFloat(e.target.value);
      setSoundVol(id, vol);
      // Sync card slider
      const cardSlider = document.querySelector(`.sound-card[data-sound="${id}"] .sc-vol`);
      if (cardSlider) cardSlider.value = vol;
    });
    // Remove button
    item.querySelector('.asi-remove').addEventListener('click', () => removeSound(id));
    list.appendChild(item);
  });
}

// ═══════════════════════════════════════════════════════════════
//  PRESETS
// ═══════════════════════════════════════════════════════════════
let presets = JSON.parse(localStorage.getItem('focus-presets') || '[]');

function savePreset(name) {
  if (!name.trim() || activeSounds.size === 0) return;
  const sounds = [...activeSounds.entries()].map(([id, {vol}]) => ({id, vol}));
  presets = presets.filter(p => p.name !== name.trim());
  presets.push({ name: name.trim(), sounds });
  localStorage.setItem('focus-presets', JSON.stringify(presets));
  renderPresets();
}

function loadPreset(name) {
  const preset = presets.find(p => p.name === name);
  if (!preset) return;
  [...activeSounds.keys()].forEach(id => removeSound(id));
  // Small delay so fades don't conflict
  setTimeout(() => preset.sounds.forEach(({id, vol}) => addSound(id, vol)), 400);
}

function deletePreset(name) {
  presets = presets.filter(p => p.name !== name);
  localStorage.setItem('focus-presets', JSON.stringify(presets));
  renderPresets();
}

function renderPresets() {
  const list = document.getElementById('presetList');
  list.innerHTML = '';
  if (presets.length === 0) {
    list.innerHTML = '<p class="mix-empty" style="margin-bottom:0">No presets saved</p>';
    return;
  }
  presets.forEach(p => {
    const row = document.createElement('div');
    row.className = 'preset-row';
    row.innerHTML = `
      <button class="preset-load-btn" title="Load: ${p.name}">${p.name}</button>
      <button class="preset-del-btn" title="Delete">✕</button>
    `;
    row.querySelector('.preset-load-btn').addEventListener('click', () => loadPreset(p.name));
    row.querySelector('.preset-del-btn').addEventListener('click', () => deletePreset(p.name));
    list.appendChild(row);
  });
}

let tasks = JSON.parse(localStorage.getItem('focus-tasks') || '[]');
const taskInput  = document.getElementById('taskInput');
const taskAddBtn = document.getElementById('taskAddBtn');
const taskList   = document.getElementById('taskList');

function saveTasks()  { localStorage.setItem('focus-tasks', JSON.stringify(tasks)); }

function renderTasks() {
  taskList.innerHTML = '';
  tasks.forEach((t, i) => {
    const li = document.createElement('li');
    li.className = 'task-item';
    li.innerHTML = `
      <button class="task-check${t.done?' done':''}" data-i="${i}">${t.done?'✓':''}</button>
      <span class="task-text${t.done?' done':''}">${escHtml(t.text)}</span>
      <button class="task-del" data-i="${i}" title="Remove">✕</button>
    `;
    taskList.appendChild(li);
  });
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function addTask() {
  const v = taskInput.value.trim();
  if (!v) return;
  tasks.push({ text: v, done: false }); taskInput.value = '';
  saveTasks(); renderTasks();
}

taskAddBtn.addEventListener('click', addTask);
taskInput.addEventListener('keydown', e => { if (e.key==='Enter') addTask(); });
taskList.addEventListener('click', e => {
  const i = parseInt(e.target.dataset.i);
  if (isNaN(i)) return;
  if (e.target.classList.contains('task-check')) { tasks[i].done = !tasks[i].done; saveTasks(); renderTasks(); }
  else if (e.target.classList.contains('task-del'))  { tasks.splice(i,1); saveTasks(); renderTasks(); }
});

// ═══════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════
buildModal();
renderPresets();
renderTasks();
</script>
</body>
</html>
